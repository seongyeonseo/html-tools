<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>온리프 진료일정 자동생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: transparent;
    min-height: 100vh;
    color: #333;
  }

  /* ── Layout ── */
  .app-wrapper {
    display: flex;
    width: 1400px;
    margin: 0 auto;
    padding: 36px 0 48px;
    align-items: flex-start;
  }

  /* ── Preview Area (left) ── */
  .preview-area {
    flex: 1;
    min-width: 0;
  }
  .preview-section {
    background: transparent;
    border-radius: 12px;
    padding: 14px;
  }
  .preview-wrap {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .preview-item { flex-shrink: 0; }
  .preview-label {
    font-size: 10px;
    font-weight: 700;
    color: #bbb;
    margin-bottom: 6px;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .preview-box {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  }
  .preview-box.draggable { cursor: grab; }
  .preview-box.draggable:active { cursor: grabbing; }
  .preview-box canvas {
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    display: block;
  }

  /* ── Sidebar (right) ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: transparent;
    padding-left: 28px;
    padding-right: 0;
    position: sticky;
    top: 36px;
    max-height: calc(100vh - 72px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .ctrl-section {
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid #e0e0e0;
  }
  .ctrl-section:last-of-type { border-bottom: none; padding-bottom: 0; }

  .ctrl-label {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #1010FF;
    letter-spacing: -0.04em;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .ctrl-label::after {
    content: "▾";
    font-size: 11px;
    color: #1010FF;
    transition: transform 0.2s;
    display: inline-block;
    line-height: 1;
  }
  .ctrl-section.collapsed .ctrl-label { margin-bottom: 0; }
  .ctrl-section.collapsed .ctrl-label::after { transform: rotate(-90deg); }
  .ctrl-section.collapsed .ctrl-body { display: none; }

  .ctrl-field { margin-bottom: 10px; }
  .ctrl-field:last-child { margin-bottom: 0; }
  .ctrl-field label {
    display: block;
    font-family: 'Pretendard', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
    letter-spacing: -0.02em;
  }
  .ctrl-field input[type="number"],
  .ctrl-field select {
    width: 100%;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    color: #222;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: -0.05em;
    appearance: none;
    -webkit-appearance: none;
  }
  .ctrl-field input[type="number"]:focus,
  .ctrl-field select:focus { border-color: #1010FF; }

  .ctrl-row { display: flex; gap: 8px; }
  .ctrl-row .ctrl-field { flex: 1; }

  /* BG Upload */
  .bg-upload-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1.5px dashed #ddd;
    border-radius: 8px;
    cursor: pointer;
    color: #aaa;
    font-size: 12px;
    font-family: 'Pretendard', sans-serif;
    transition: border-color 0.15s, color 0.15s;
    width: 100%;
  }
  .bg-upload-label:hover { border-color: #1010FF; color: #1010FF; }
  .bg-thumb { width: 36px; height: 24px; object-fit: cover; border-radius: 4px; display: none; }

  /* Range sliders */
  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .range-lbl { font-size: 11px; color: #888; font-weight: 600; width: 32px; flex-shrink: 0; }
  .range-row input[type="range"] { flex: 1; accent-color: #1010FF; cursor: pointer; }
  .range-val { font-size: 11px; color: #1010FF; font-weight: 700; width: 34px; text-align: right; flex-shrink: 0; }

  /* Color legend */
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-item input[type="color"] {
    width: 22px; height: 22px;
    border: none; border-radius: 50%;
    cursor: pointer; padding: 0; background: none;
    flex-shrink: 0;
  }
  .legend-item span { font-size: 11px; font-weight: 600; }

  /* Calendar grid in sidebar */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 4px;
  }
  .cal-dow {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    padding: 4px 0;
    border-bottom: 1px solid #EEE;
  }
  .cal-cell {
    min-height: 36px;
    border-radius: 5px;
    border: 1px solid #EEE;
    cursor: pointer;
    text-align: center;
    padding: 3px 1px;
    transition: border-color 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .cal-cell:hover { border-color: #1010FF; }
  .cal-cell.empty { border: none; cursor: default; background: transparent; }
  .cal-cell .day-num { font-size: 11px; font-weight: 700; }
  .cal-cell .day-badge { font-size: 7.5px; line-height: 1.3; margin-top: 1px; }

  /* Download buttons */
  .btn-dl {
    width: 100%;
    border: none;
    border-radius: 7px;
    padding: 11px 0;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    margin-bottom: 8px;
    transition: opacity 0.15s;
    letter-spacing: -0.03em;
    color: #fff;
    display: block;
  }
  .btn-dl:hover { opacity: 0.85; }
  .btn-dl:last-child { margin-bottom: 0; }
  .btn-dl-pc  { background: #D4D4D4; color: #555; }
  .btn-dl-mo  { background: #D4D4D4; color: #555; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 300px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.18);
  }
  .modal h3 {
    font-size: 15px;
    font-weight: 800;
    color: #1010FF;
    margin-bottom: 16px;
    letter-spacing: -0.04em;
  }
  .modal-lbl {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .modal select,
  .modal input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid #e0e0e0;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    outline: none;
    background: #fff;
    margin-bottom: 14px;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }
  .modal select:focus,
  .modal input[type="text"]:focus { border-color: #1010FF; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    font-size: 13px;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-btns button:hover { opacity: 0.85; }
  .btn-cancel { background: #EBEBEB; color: #555; }
  .btn-save   { background: #1010FF; color: #fff; }
  .field-group { display: none; }
  .field-group.show { display: block; }
</style>
</head>
<body>
<div class="app-wrapper">

  <!-- ── Left: Preview ── -->
  <div class="preview-area">
    <div class="preview-section">
      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-item" id="pc-preview-item">
          <div class="preview-label">PC  800 × 600</div>
          <div class="preview-box" id="pc-box">
            <canvas id="canvas-pc"></canvas>
          </div>
        </div>
        <div class="preview-item" id="mo-preview-item">
          <div class="preview-label">Mobile  438 × 540</div>
          <div class="preview-box" id="mo-box">
            <canvas id="canvas-mo"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Right: Sidebar ── -->
  <div class="sidebar">

    <!-- 연도 / 월 -->
    <div class="ctrl-section">
      <div class="ctrl-label">연도 / 월</div>
      <div class="ctrl-body">
        <div class="ctrl-row">
          <div class="ctrl-field">
            <label>연도</label>
            <input type="number" id="inp-year" value="2025"/>
          </div>
          <div class="ctrl-field">
            <label>월</label>
            <select id="inp-month">
              <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
              <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
              <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 배경 이미지 -->
    <div class="ctrl-section">
      <div class="ctrl-label">배경 이미지</div>
      <div class="ctrl-body">
        <div class="ctrl-field">
          <label class="bg-upload-label">
            <img id="bg-thumb" class="bg-thumb" alt="bg"/>
            <span id="bg-upload-txt">+ 배경 업로드</span>
            <input type="file" accept="image/*" id="bg-file" style="display:none"/>
          </label>
        </div>
        <div id="bg-controls" style="display:none;">
          <div class="range-row">
            <span class="range-lbl">확대</span>
            <input type="range" id="bg-scale" min="100" max="300" value="100" step="1"/>
            <span class="range-val" id="bg-scale-val">100%</span>
          </div>
          <div class="range-row">
            <span class="range-lbl">어둡기</span>
            <input type="range" id="bg-opacity" min="0" max="80" value="20" step="1"/>
            <span class="range-val" id="bg-opacity-val">20%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 일정 유형 색상 -->
    <div class="ctrl-section">
      <div class="ctrl-label">일정 유형 색상</div>
      <div class="ctrl-body">
        <div class="legend">
          <div class="legend-item">
            <input type="color" id="color-holiday" value="#FED3D0" title="정기휴무/휴무 색상"/>
            <span id="legend-holiday-label" style="color:#FED3D0">정기휴무 / 휴무</span>
          </div>
          <div class="legend-item">
            <input type="color" id="color-clinic" value="#8EB9D7" title="정상진료/단축진료 색상"/>
            <span id="legend-clinic-label" style="color:#8EB9D7">정상진료 / 단축진료</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 날짜별 일정 설정 -->
    <div class="ctrl-section">
      <div class="ctrl-label">날짜별 일정 설정</div>
      <div class="ctrl-body">
        <div style="font-size:10px;color:#bbb;margin-bottom:6px;letter-spacing:-0.02em;">날짜 클릭 → 편집</div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- 다운로드 -->
    <div class="ctrl-section">
      <div class="ctrl-label">다운로드</div>
      <div class="ctrl-body">
        <button class="btn-dl btn-dl-pc" id="btn-dl-pc">PC 저장 (800×600)</button>
        <button class="btn-dl btn-dl-mo" id="btn-dl-mo">모바일 저장 (438×540)</button>
      </div>
    </div>

  </div><!-- /sidebar -->
</div><!-- /app-wrapper -->

<!-- ── Edit Modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">일정 설정</h3>
    <span class="modal-lbl">일정 유형</span>
    <select id="modal-type">
      <option value="없음">없음 (기본)</option>
      <option value="정기휴무">정기휴무</option>
      <option value="정상진료">정상진료</option>
      <option value="단축진료">단축진료</option>
      <option value="휴무">휴무</option>
      <option value="공휴일진료">공휴일진료</option>
    </select>
    <div class="field-group" id="field-time">
      <span class="modal-lbl">진료 시간</span>
      <input type="text" id="modal-time" placeholder="예: 9:30~17:00"/>
    </div>
    <div class="field-group" id="field-label">
      <span class="modal-lbl">휴무 명칭</span>
      <input type="text" id="modal-label" placeholder="예: 설날 연휴 휴무"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-cancel">취소</button>
      <button class="btn-save"   id="btn-save">저장</button>
    </div>
  </div>
</div>

// ── Helpers ────────────────────────────────────────────────────────────────
function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getFirstDay(y, m)    { return new Date(y, m - 1, 1).getDay(); }
function buildCells(y, m) {
  const fd = getFirstDay(y, m), td = getDaysInMonth(y, m);
  const c = [];
  for (let i = 0; i < fd; i++) c.push(null);
  for (let d = 1; d <= td; d++) c.push(d);
  return c;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arc(x+w-r, y+r,   r, -Math.PI/2, 0);
  ctx.lineTo(x+w, y+h-r); ctx.arc(x+w-r, y+h-r, r,  0,        Math.PI/2);
  ctx.lineTo(x+r, y+h); ctx.arc(x+r,   y+h-r, r,  Math.PI/2, Math.PI);
  ctx.lineTo(x, y+r); ctx.arc(x+r,   y+r,   r,  Math.PI,   3*Math.PI/2);
  ctx.closePath();
}

// ── Canvas render ──────────────────────────────────────────────────────────
function renderCanvas(canvas, mode) {
  const isPC = mode === 'pc';
  const W = isPC ? 800 : 438;
  const H = isPC ? 600 : 540;
  const DPR = 2;

  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  const headerH = isPC ? H * 0.30 : H * 0.33;

  if (bgImageEl) {
    const iw = bgImageEl.naturalWidth, ih = bgImageEl.naturalHeight;
    const _off = bgOffset[mode==='pc'?'pc':'mo'];
    const sc = Math.max(W/iw, H/ih) * bgScale;
    const baseX = (W - iw*sc)/2;
    const baseY = (H - ih*sc)/2;
    const offX = (iw*sc - W) / 2 * (_off.x / 100);
    const offY = (ih*sc - H) / 2 * (_off.y / 100);
    ctx.drawImage(bgImageEl, baseX - offX, baseY - offY, iw*sc, ih*sc);
    ctx.fillStyle = `rgba(0,0,0,${bgOpacity})`;
    ctx.fillRect(0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#D0D0D0'); g.addColorStop(1,'#E8E8E8');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = `rgba(0,0,0,${bgOpacity})`;
    ctx.fillRect(0,0,W,H);
  }

  // Header text
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const logoW = isPC ? 60 : 44;
  const logoH = Math.round(logoW * 99 / 302);
  const logoY = headerH * 0.28 - logoH / 2;
  if (LOGO_IMG.complete && LOGO_IMG.naturalWidth > 0) {
    ctx.drawImage(LOGO_IMG, W/2 - logoW/2, logoY, logoW, logoH);
  }

  ctx.font = `800 ${isPC?36:31}px 'Pretendard', sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText(`${month}월 진료 일정 안내`, W/2, headerH*(isPC ? 0.50 : 0.48));

  ctx.font = `400 ${isPC?12:10.5}px 'Pretendard', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.90)';
  ctx.fillText('일정을 참고하시어, 내원에 착오 없으시도록 부탁드립니다.', W/2, headerH*(isPC ? 0.70 : 0.67));

  // Card
  const cardTop = headerH - (isPC ? 22 : 16);
  const cardPad = isPC ? 44 : 28;
  const cardW   = W - cardPad*2;
  const cardH   = H - cardTop - (isPC ? 32 : 24);

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.10)'; ctx.shadowBlur=22; ctx.shadowOffsetY=4;
  ctx.fillStyle='rgba(255,255,255,0.88)';
  roundRect(ctx, cardPad, cardTop, cardW, cardH, 18); ctx.fill();
  ctx.restore();

  // Day headers
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const colW       = cardW / 7;
  const headerRowH = isPC ? 48 : 40;

  ctx.textBaseline='middle'; ctx.textAlign='center';
  DAYS.forEach((d,i) => {
    ctx.font = `700 ${isPC?12:10.5}px 'Pretendard', sans-serif`;
    ctx.fillStyle = i===0?'#C0392B': i===6?COLOR_CLINIC:'#666';
    ctx.fillText(d, cardPad + colW*i + colW/2, cardTop + (isPC ? 18 : 15) + (isPC ? 6 : 5.25));
  });

  ctx.strokeStyle='#ECECEC'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(cardPad+12, cardTop+headerRowH);
  ctx.lineTo(cardPad+cardW-12, cardTop+headerRowH);
  ctx.stroke();

  // Grid
  const cells     = buildCells(year, month);
  const totalRows = Math.ceil(cells.length/7);
  const gridTop   = cardTop + headerRowH + (isPC ? 18 : 15);
  const gridH     = cardH - headerRowH - (isPC ? 36 : 30);
  const rowH      = gridH / totalRows;
  const circleR   = isPC ? 19 : 16;
  const dateFontSz  = isPC ? 15 : 13;
  const labelFontSz = isPC ? 10 : 8.5;
  const timeFontSz  = isPC ? 10 : 8.5;

  // Pass 1: holiday pills
  for (let row=0; row<totalRows; row++) {
    let start=-1, end=-1, startDay=-1, curLabel=null;
    const flush = (s, e, sDay) => {
      if (s===-1 || e < s) return;
      const cy = gridTop + row*rowH + circleR + 2;
      const x1 = cardPad + s*colW + colW/2;
      const x2 = cardPad + e*colW + colW/2;
      if (e > s) {
        ctx.beginPath();
        ctx.moveTo(x1, cy-circleR);
        ctx.lineTo(x2, cy-circleR);
        ctx.arc(x2, cy, circleR, -Math.PI/2, Math.PI/2);
        ctx.lineTo(x1, cy+circleR);
        ctx.arc(x1, cy, circleR, Math.PI/2, 3*Math.PI/2);
        ctx.closePath();
        ctx.fillStyle=COLOR_HOLIDAY+'33'; ctx.fill();
        ctx.strokeStyle=COLOR_HOLIDAY; ctx.lineWidth=1.5; ctx.stroke();
        const midX = (x1 + x2) / 2;
        const labelY = cy + circleR + (isPC?5:4);
        const sched = schedule[sDay];
        ctx.font=`700 ${labelFontSz}px 'Pretendard', sans-serif`;
        ctx.fillStyle=COLOR_HOLIDAY; ctx.textAlign='center'; ctx.textBaseline='top';
        (sched?.label||'휴무').split(' ').forEach((line,li)=>{
          ctx.fillText(line, midX, labelY+li*(labelFontSz+2));
        });
      }
    };
    for (let col=0; col<7; col++) {
      const day = cells[row*7+col];
      const sched = day ? schedule[day] : null;
      if (day && sched?.type==='휴무') {
        const dayLabel = sched?.label || '휴무';
        if (start===-1) {
          start=col; startDay=day; curLabel=dayLabel; end=col;
        } else if (dayLabel === curLabel) {
          end=col;
        } else {
          flush(start,end,startDay);
          start=col; startDay=day; curLabel=dayLabel; end=col;
        }
      } else {
        flush(start,end,startDay);
        start=-1; end=-1; startDay=-1; curLabel=null;
      }
    }
    flush(start,end,startDay);
  }

  // Pass 2: each day
  cells.forEach((day, idx) => {
    if (!day) return;
    const row=Math.floor(idx/7), col=idx%7;
    const cx = cardPad + col*colW + colW/2;
    const cy = gridTop + row*rowH + circleR + 2;
    const sched = schedule[day];

    let dc = '#1a1a1a';
    if (col===0) dc='#C0392B';
    if (col===6) dc=COLOR_CLINIC;
    if (sched?.type==='정기휴무') dc=COLOR_HOLIDAY;
    if (sched?.type==='정상진료'||sched?.type==='단축진료'||sched?.type==='공휴일진료') dc=COLOR_CLINIC;
    if (sched?.type==='휴무') dc=COLOR_HOLIDAY;

    if (sched?.type==='정상진료'||sched?.type==='단축진료'||sched?.type==='공휴일진료') {
      ctx.beginPath(); ctx.arc(cx,cy,circleR,0,Math.PI*2);
      ctx.fillStyle=COLOR_CLINIC+'22'; ctx.fill();
      ctx.strokeStyle=COLOR_CLINIC; ctx.lineWidth=1.5; ctx.stroke();
    }
    if (sched?.type==='휴무') {
      const thisLabel = sched?.label||'휴무';
      const pRow=Math.floor((idx-1)/7)===row, nRow=Math.floor((idx+1)/7)===row;
      const pH=pRow&&cells[idx-1]&&schedule[cells[idx-1]]?.type==='휴무'&&(schedule[cells[idx-1]]?.label||'휴무')===thisLabel;
      const nH=nRow&&cells[idx+1]&&schedule[cells[idx+1]]?.type==='휴무'&&(schedule[cells[idx+1]]?.label||'휴무')===thisLabel;
      if (!pH&&!nH) {
        ctx.beginPath(); ctx.arc(cx,cy,circleR,0,Math.PI*2);
        ctx.fillStyle=COLOR_HOLIDAY+'33'; ctx.fill();
        ctx.strokeStyle=COLOR_HOLIDAY; ctx.lineWidth=1.5; ctx.stroke();
      }
    }

    ctx.font=`700 ${dateFontSz}px 'Pretendard', sans-serif`;
    ctx.fillStyle=dc; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(day), cx, cy);

    const labelY = cy + circleR + (isPC?5:4);
    ctx.textBaseline='top';

    if (sched?.type==='정기휴무') {
      ctx.font=`700 ${labelFontSz}px 'Pretendard', sans-serif`;
      ctx.fillStyle=COLOR_HOLIDAY; ctx.fillText('정기휴무', cx, labelY);
    } else if (sched?.type==='정상진료'||sched?.type==='단축진료'||sched?.type==='공휴일진료') {
      ctx.font=`700 ${labelFontSz}px 'Pretendard', sans-serif`;
      ctx.fillStyle=COLOR_CLINIC; ctx.fillText(sched.type, cx, labelY);
      if (sched.time) {
        ctx.font=`500 ${timeFontSz}px 'Pretendard', sans-serif`;
        ctx.fillText(sched.time, cx, labelY+labelFontSz+2);
      }
    } else if (sched?.type==='휴무') {
      const thisLabel2 = sched?.label||'휴무';
      const pRow2=Math.floor((idx-1)/7)===row, nRow2=Math.floor((idx+1)/7)===row;
      const pH2=pRow2&&cells[idx-1]&&schedule[cells[idx-1]]?.type==='휴무'&&(schedule[cells[idx-1]]?.label||'휴무')===thisLabel2;
      const nH2=nRow2&&cells[idx+1]&&schedule[cells[idx+1]]?.type==='휴무'&&(schedule[cells[idx+1]]?.label||'휴무')===thisLabel2;
      if (!pH2&&!nH2) {
        ctx.font=`700 ${labelFontSz}px 'Pretendard', sans-serif`;
        ctx.fillStyle=COLOR_HOLIDAY;
        thisLabel2.split(' ').forEach((line,li)=>{
          ctx.fillText(line, cx, labelY+li*(labelFontSz+2));
        });
      }
    }
  });
}

// ── Redraw both ────────────────────────────────────────────────────────────
function redrawAll() {
  renderCanvas(canvasPC, 'pc');
  renderCanvas(canvasMO, 'mobile');
  updatePreviewSizes();
}

// ── Preview sizing ─────────────────────────────────────────────────────────
function updatePreviewSizes() {
  const wrapW   = previewWrap.clientWidth;
  const GAP     = 12;
  const inner   = Math.max(wrapW - GAP - 28, 100);
  const PC_W=800, PC_H=600, MO_W=438, MO_H=540;
  const pcFrac  = PC_W/(PC_W+MO_W);
  const pcContW = Math.floor(inner * pcFrac);
  const moContW = inner - pcContW;

  const pcScale = pcContW / PC_W;
  const moScale = moContW / MO_W;

  const pcPrev = document.getElementById('pc-preview-item');
  pcPrev.style.flex = `0 0 ${pcContW}px`;
  pcBox.style.width  = pcContW + 'px';
  pcBox.style.height = Math.round(PC_H * pcScale) + 'px';
  canvasPC.style.transform = `scale(${pcScale})`;

  const moPrev = document.getElementById('mo-preview-item');
  moPrev.style.flex = `0 0 ${moContW}px`;
  moBox.style.width  = moContW + 'px';
  moBox.style.height = Math.round(MO_H * moScale) + 'px';
  canvasMO.style.transform = `scale(${moScale})`;
}

// ── Calendar editor ────────────────────────────────────────────────────────
function getDayColor(col) {
  return col===0 ? '#C0392B' : col===6 ? COLOR_CLINIC : '#333';
}

function renderCalEditor() {
  calGrid.innerHTML = '';
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  DAYS.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='cal-dow';
    el.style.color = i===0?'#C0392B':i===6?'#8EB9D7':'#888';
    el.textContent=d;
    calGrid.appendChild(el);
  });

  const cells = buildCells(year, month);
  cells.forEach((day, idx)=>{
    const col=idx%7;
    const el=document.createElement('div');
    if (!day) { el.className='cal-cell empty'; calGrid.appendChild(el); return; }

    const s=schedule[day];
    const bg = s?.type==='정기휴무'||s?.type==='휴무' ? COLOR_HOLIDAY+'33'
             : s?.type==='정상진료'||s?.type==='단축진료'||s?.type==='공휴일진료' ? COLOR_CLINIC+'22' : '#fff';
    el.className='cal-cell';
    el.style.background=bg;

    const numEl=document.createElement('span');
    numEl.className='day-num';
    numEl.style.color=getDayColor(col);
    numEl.textContent=day;
    el.appendChild(numEl);

    if (s) {
      const badge=document.createElement('span');
      badge.className='day-badge';
      const c={정기휴무:COLOR_HOLIDAY,정상진료:COLOR_CLINIC,단축진료:COLOR_CLINIC,공휴일진료:COLOR_CLINIC,휴무:COLOR_HOLIDAY}[s.type]||'#999';
      badge.style.color=c;
      badge.textContent=s.type==='휴무'?(s.label?s.label.slice(0,5):'휴무'):s.type;
      el.appendChild(badge);
    }

    el.addEventListener('click', ()=>openModal(day));
    calGrid.appendChild(el);
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(day) {
  editDay=day;
  modalTitle.textContent=`${month}월 ${day}일 일정 설정`;
  const s=schedule[day];
  modalType.value = s?.type||'없음';
  modalTime.value = s?.time||'';
  modalLabel.value= s?.label||'';
  updateModalFields();
  overlay.classList.add('open');
}

function updateModalFields() {
  const t=modalType.value;
  fieldTime.classList.toggle('show', t==='정상진료'||t==='단축진료'||t==='공휴일진료');
  fieldLabel.classList.toggle('show', t==='휴무');
}

modalType.addEventListener('change', ()=>{ modalTime.value=''; modalLabel.value=''; updateModalFields(); });
document.getElementById('btn-cancel').addEventListener('click', ()=>{ overlay.classList.remove('open'); });
overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.classList.remove('open'); });

document.getElementById('btn-save').addEventListener('click', ()=>{
  const t=modalType.value;
  if (t==='없음') { delete schedule[editDay]; }
  else { schedule[editDay]={ type:t, time:modalTime.value, label:modalLabel.value }; }
  overlay.classList.remove('open');
  renderCalEditor();
  redrawAll();
});

// ── Year/Month controls ────────────────────────────────────────────────────
inpYear.addEventListener('change', ()=>{ year=+inpYear.value; renderCalEditor(); redrawAll(); });
inpMonth.addEventListener('change', ()=>{ month=+inpMonth.value; renderCalEditor(); redrawAll(); });

// ── Color pickers ─────────────────────────────────────────────────────────
document.getElementById('color-holiday').addEventListener('input', e => {
  COLOR_HOLIDAY = e.target.value;
  document.getElementById('legend-holiday-label').style.color = COLOR_HOLIDAY;
  renderCalEditor(); redrawAll();
});
document.getElementById('color-clinic').addEventListener('input', e => {
  COLOR_CLINIC = e.target.value;
  document.getElementById('legend-clinic-label').style.color = COLOR_CLINIC;
  renderCalEditor(); redrawAll();
});

// ── BG upload ──────────────────────────────────────────────────────────────
bgFile.addEventListener('change', ()=>{
  const file=bgFile.files[0]; if(!file) return;
  const url=URL.createObjectURL(file);
  bgThumb.src=url; bgThumb.style.display='block';
  bgTxt.textContent='배경 변경';
  const img=new Image();
  img.onload=()=>{
    bgImageEl=img;
    document.getElementById('bg-controls').style.display='block';
    document.getElementById('bg-scale').value=100;
    document.getElementById('bg-scale-val').textContent='100%';
    bgScale=1.0; bgOffset={pc:{x:0,y:0}, mo:{x:0,y:0}}; bgOpacity=0.20;
    document.getElementById('bg-opacity').value=20;
    document.getElementById('bg-opacity-val').textContent='20%';
    redrawAll();
    [pcBox, moBox].forEach(b => b.classList.add('draggable'));
  };
  img.src=url;
});

document.getElementById('bg-scale').addEventListener('input', e=>{
  bgScale = e.target.value / 100;
  document.getElementById('bg-scale-val').textContent = e.target.value + '%';
  redrawAll();
});
document.getElementById('bg-opacity').addEventListener('input', e=>{
  bgOpacity = e.target.value / 100;
  document.getElementById('bg-opacity-val').textContent = e.target.value + '%';
  redrawAll();
});

// ── Drag to pan background ─────────────────────────────────────────────────
(function() {
  let isDragging = false;
  let activeMode = null;
  let dragStartX = 0, dragStartY = 0;
  let startX = 0, startY = 0;

  function getBoxScale(box) {
    const canvas = box.querySelector('canvas');
    const nativeW = parseFloat(canvas.style.width);
    return box.clientWidth / nativeW;
  }
  function getCanvasSize(mode) {
    return mode === 'pc' ? { W:800, H:600 } : { W:438, H:540 };
  }
  function startDrag(e, mode) {
    if (!bgImageEl) return;
    isDragging = true; activeMode = mode;
    dragStartX = e.clientX; dragStartY = e.clientY;
    startX = bgOffset[mode].x; startY = bgOffset[mode].y;
    e.preventDefault();
  }
  function moveDrag(e, box) {
    if (!isDragging) return;
    const mode = activeMode;
    const { W, H } = getCanvasSize(mode);
    const scl = getBoxScale(box);
    const dx = (e.clientX - dragStartX) / scl;
    const dy = (e.clientY - dragStartY) / scl;
    const iw = bgImageEl.naturalWidth, ih = bgImageEl.naturalHeight;
    const sc = Math.max(W/iw, H/ih) * bgScale;
    const maxDX = Math.max(0, (iw*sc - W) / 2);
    const maxDY = Math.max(0, (ih*sc - H) / 2);
    bgOffset[mode].x = maxDX > 0 ? Math.max(-100, Math.min(100, startX - (dx/maxDX)*100)) : 0;
    bgOffset[mode].y = maxDY > 0 ? Math.max(-100, Math.min(100, startY - (dy/maxDY)*100)) : 0;
    redrawAll();
  }
  function endDrag() { isDragging = false; activeMode = null; }

  const boxes = { pc: pcBox, mo: moBox };
  Object.entries(boxes).forEach(([mode, box]) => {
    box.addEventListener('mousedown',  e => startDrag(e, mode));
    box.addEventListener('mousemove',  e => { if (isDragging && activeMode===mode) moveDrag(e, box); });
    box.addEventListener('mouseup',    endDrag);
    box.addEventListener('mouseleave', endDrag);
    box.addEventListener('touchstart', e => { startDrag(e.touches[0], mode); e.preventDefault(); }, { passive:false });
    box.addEventListener('touchmove',  e => { if (isDragging) { moveDrag(e.touches[0], box); e.preventDefault(); } }, { passive:false });
    box.addEventListener('touchend',   endDrag);
  });
})();

// ── Download ───────────────────────────────────────────────────────────────
document.getElementById('btn-dl-pc').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download=`${year}년_${month}월_진료일정_PC.jpg`;
  a.href=canvasPC.toDataURL('image/jpeg',0.95); a.click();
});
document.getElementById('btn-dl-mo').addEventListener('click', ()=>{
  const a=document.createElement('a');
  a.download=`${year}년_${month}월_진료일정_MO.jpg`;
  a.href=canvasMO.toDataURL('image/jpeg',0.95); a.click();
});

// ── Sidebar section toggle ─────────────────────────────────────────────────
document.querySelectorAll('.ctrl-label').forEach(label => {
  label.addEventListener('click', function() {
    this.closest('.ctrl-section').classList.toggle('collapsed');
  });
});

// ── Resize observer ────────────────────────────────────────────────────────
const ro = new ResizeObserver(()=>requestAnimationFrame(()=>updatePreviewSizes()));
ro.observe(previewWrap);

// ── Init render ───────────────────────────────────────────────────────────
renderCalEditor();
setTimeout(redrawAll, 150);
</script>
