<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>커스텀 캘린더 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Pretendard','Noto Sans KR',sans-serif;min-height:100vh;color:#1d1d1f;background:#f2f2f7;}

/* ── Layout ─────────────────────────────────────── */
.app{display:flex;width:1360px;margin:0 auto;padding:32px 0 60px;align-items:flex-start;gap:20px;}

/* ── Preview area ───────────────────────────────── */
.preview-area{flex:1;min-width:0;}
.preview-row{display:flex;gap:12px;align-items:flex-start;}
.preview-row+.preview-row{margin-top:12px;}
.preview-item{flex-shrink:0;}
.preview-label{font-size:10px;font-weight:600;color:#8e8e93;margin-bottom:6px;text-align:center;letter-spacing:.04em;text-transform:uppercase;}
.preview-box{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12),0 0 0 .5px rgba(0,0,0,.06);}
.preview-box canvas{position:absolute;top:0;left:0;transform-origin:top left;display:block;}

/* A4 preview centered */
#a4-item{display:flex;flex-direction:column;align-items:center;}

/* ── Sidebar ────────────────────────────────────── */
.sidebar{width:272px;flex-shrink:0;}

.ctrl-card{background:#fff;border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07),0 0 0 .5px rgba(0,0,0,.05);}

.ctrl-header{display:flex;align-items:center;padding:11px 14px;cursor:pointer;user-select:none;gap:8px;}
.ctrl-header-title{flex:1;font-size:12.5px;font-weight:600;color:#1d1d1f;letter-spacing:-.01em;}
.ctrl-chevron{font-size:14px;color:#c7c7cc;transition:transform .2s;display:inline-block;transform:rotate(90deg);}
.ctrl-header.open .ctrl-chevron{transform:rotate(-90deg);}

.ctrl-body{padding:10px 14px 14px;border-top:.5px solid rgba(0,0,0,.06);}
.ctrl-body.hidden{display:none;}

/* ── Form ───────────────────────────────────────── */
.form-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.form-label{font-size:11.5px;color:#6e6e73;min-width:44px;flex-shrink:0;}

select,input[type=text],textarea{
  font-family:-apple-system,'Pretendard',sans-serif;font-size:12px;
  border:.5px solid rgba(0,0,0,.14);border-radius:7px;padding:5px 8px;
  background:#f5f5f7;color:#1d1d1f;width:100%;outline:none;
  -webkit-appearance:none;appearance:none;
}
textarea{resize:none;line-height:1.55;}
select:focus,input[type=text]:focus,textarea:focus{border-color:#1010FF;box-shadow:0 0 0 3px rgba(16,16,255,.1);background:#fff;}

input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:#e5e5ea;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25),0 0 0 .5px rgba(0,0,0,.1);cursor:pointer;}
.range-val{font-size:11px;color:#8e8e93;width:32px;text-align:right;flex-shrink:0;}

input[type=color].swatch{-webkit-appearance:none;appearance:none;width:22px;height:22px;border:none;padding:0;border-radius:50%;cursor:pointer;flex-shrink:0;box-shadow:0 0 0 1.5px rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.1);overflow:hidden;}
input[type=color].swatch::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;}
input[type=color].swatch::-webkit-color-swatch{border:none;border-radius:50%;}

/* ── Logo radio pills ───────────────────────────── */
.logo-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.logo-opt{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:.5px solid rgba(0,0,0,.1);background:#f5f5f7;cursor:pointer;transition:all .12s;}
.logo-opt input{display:none;}
.logo-opt label{font-size:11px;color:#1d1d1f;cursor:pointer;font-weight:500;line-height:1.2;}
.logo-opt:has(input:checked){background:#1010FF;border-color:#1010FF;}
.logo-opt:has(input:checked) label{color:#fff;}

/* ── Upload ─────────────────────────────────────── */
.btn-upload{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:.5px solid rgba(0,0,0,.15);border-radius:7px;background:#f5f5f7;font-size:11.5px;color:#1d1d1f;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;transition:all .1s;}
.btn-upload:hover{background:#e5e5ea;}
.btn-clear{padding:4px 9px;border:.5px solid rgba(0,0,0,.12);border-radius:6px;background:#f5f5f7;font-size:11px;color:#8e8e93;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;transition:all .1s;}
.btn-clear:hover{color:#ff3b30;border-color:#ff3b30;background:#fff5f4;}

/* ── Highlights ─────────────────────────────────── */
.hl-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.hl-item{border:.5px solid rgba(0,0,0,.1);border-radius:9px;padding:7px 9px;background:#f5f5f7;cursor:pointer;transition:all .12s;}
.hl-item.active{border-color:#1010FF;background:#f0f0ff;}
.hl-top{display:flex;align-items:center;gap:7px;}
.hl-label-inp{font-size:12px;border:none;background:transparent;flex:1;color:#1d1d1f;outline:none;font-family:-apple-system,'Pretendard',sans-serif;min-width:0;}
.hl-item.active .hl-label-inp{color:#1010FF;}
.hl-meta{display:flex;align-items:center;gap:6px;margin-top:5px;}
.btn-eye{padding:3px 7px;border:.5px solid rgba(0,0,0,.12);border-radius:5px;background:#fff;font-size:10px;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;color:#444;transition:all .1s;}
.btn-eye:hover{border-color:#1010FF;color:#1010FF;}
.btn-del{margin-left:auto;font-size:14px;color:#c7c7cc;background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;transition:color .1s;}
.btn-del:hover{color:#ff3b30;}
.hl-count{font-size:9px;color:#aeaeb2;}
.btn-add-hl{width:100%;padding:7px;border:.5px dashed #c7c7cc;border-radius:9px;background:none;font-size:11.5px;color:#8e8e93;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;transition:all .12s;}
.btn-add-hl:hover:not(:disabled){border-color:#1010FF;color:#1010FF;}
.btn-add-hl:disabled{opacity:.35;cursor:default;}

/* ── Calendar editor ────────────────────────────── */
.cal-editor{margin-top:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:8px;font-weight:700;text-align:center;padding:4px 0;color:#c7c7cc;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;user-select:none;}
.cal-cell:not(.empty):hover{outline:1.5px solid #1010FF;outline-offset:-1.5px;}
.cal-cell.empty{cursor:default;}
.day-num{font-size:10px;font-weight:600;line-height:1;}
.day-badge{font-size:6.5px;font-weight:700;line-height:1;margin-top:1px;}

/* ── Image palette ──────────────────────────────── */
.img-palette{margin-top:9px;padding-top:9px;border-top:.5px solid rgba(0,0,0,.07);}
.palette-title{font-size:10px;color:#aeaeb2;margin-bottom:7px;}
.palette-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;}
.p-chip{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .12s;box-shadow:0 0 0 1.5px rgba(255,255,255,.9),0 0 0 3px rgba(0,0,0,.12);}
.p-chip:hover{transform:scale(1.2);box-shadow:0 0 0 2px #fff,0 0 0 4px #1010FF;}

/* ── Preview tabs ───────────────────────────────── */
.preview-tabs{display:flex;gap:5px;margin-bottom:12px;}
.ptab{padding:6px 14px;border-radius:8px;border:none;background:#e5e5ea;font-size:11.5px;font-weight:600;color:#8e8e93;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;transition:all .15s;}
.ptab.active{background:#1010FF;color:#fff;}
.ptab:hover:not(.active){background:#d1d1d6;}
.preview-stage{min-height:200px;}
.preview-pane{display:none;justify-content:center;}
.preview-pane.active{display:flex;}

/* ── History ────────────────────────────────────── */
.btn-save-hist{width:100%;padding:8px;border:.5px solid #1010FF;border-radius:8px;background:#f0f0ff;font-size:12px;font-weight:600;color:#1010FF;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;margin-bottom:8px;transition:all .1s;}
.btn-save-hist:hover{background:#1010FF;color:#fff;}
.hist-empty{font-size:11px;color:#aeaeb2;text-align:center;padding:10px 0;}
.hist-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;background:#f5f5f7;margin-bottom:4px;}
.hist-info{flex:1;min-width:0;}
.hist-label{font-size:12px;font-weight:600;color:#1d1d1f;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-time{font-size:10px;color:#aeaeb2;}
.hist-btns{display:flex;gap:3px;flex-shrink:0;}
.hist-btns button{padding:3px 7px;border-radius:5px;border:.5px solid rgba(0,0,0,.12);background:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;color:#1d1d1f;transition:all .1s;}
.hist-btns button:hover{border-color:#1010FF;color:#1010FF;}
.hist-btns button.del:hover{border-color:#ff3b30;color:#ff3b30;}

/* ── Export ─────────────────────────────────────── */
.export-btns{display:flex;flex-direction:column;gap:5px;}
.btn-export{width:100%;padding:9px 12px;border:none;border-radius:8px;cursor:pointer;font-family:-apple-system,'Pretendard',sans-serif;font-size:12px;font-weight:600;color:#fff;background:#1010FF;transition:opacity .1s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-export:hover{opacity:.82;}
.btn-export.s2{background:#3c3c43;}
.btn-export.s3{background:#636366;}
</style>
</head>
<body>
<span style="position:absolute;visibility:hidden;font-family:'Cormorant Garamond';font-size:1px;font-weight:300">·</span>

<div class="app">

  <!-- ── Preview ──────────────────────────────────── -->
  <div class="preview-area">
    <div class="preview-tabs">
      <button class="ptab active" data-mode="pc" onclick="switchTab('pc')">PC · 800×600</button>
      <button class="ptab" data-mode="mo" onclick="switchTab('mo')">Mobile · 428×540</button>
      <button class="ptab" data-mode="a4" onclick="switchTab('a4')">A4 · 210×297mm</button>
    </div>
    <div class="preview-stage" id="preview-stage">
      <div class="preview-pane active" id="pane-pc">
        <div class="preview-box" id="pc-box"><canvas id="canvas-pc" width="800" height="600"></canvas></div>
      </div>
      <div class="preview-pane" id="pane-mo">
        <div class="preview-box" id="mo-box"><canvas id="canvas-mo" width="428" height="540"></canvas></div>
      </div>
      <div class="preview-pane" id="pane-a4">
        <div class="preview-box" id="a4-box"><canvas id="canvas-a4" width="420" height="594"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ── Sidebar ──────────────────────────────────── -->
  <div class="sidebar">

    <!-- 월/년도 -->
    <div class="ctrl-card">
      <div class="ctrl-header open" onclick="toggleCard(this)">
        <span class="ctrl-header-title">월 / 년도</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body">
        <div class="form-row">
          <span class="form-label">년도</span>
          <select id="sel-year"></select>
        </div>
        <div class="form-row">
          <span class="form-label">월</span>
          <select id="sel-month"></select>
        </div>
        <div class="form-row">
          <span class="form-label">크기</span>
          <input type="range" id="title-size" min="28" max="76" value="52"/>
          <span class="range-val" id="title-size-val">52</span>
        </div>
      </div>
    </div>

    <!-- 배경 -->
    <div class="ctrl-card">
      <div class="ctrl-header" onclick="toggleCard(this)">
        <span class="ctrl-header-title">배경</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body hidden">
        <div class="form-row">
          <span class="form-label">배경색</span>
          <input type="color" id="bg-color" class="swatch" value="#F5F0E7"/>
        </div>
        <div class="form-row" style="gap:6px">
          <label class="btn-upload" for="bg-img-input">이미지 선택</label>
          <input type="file" id="bg-img-input" accept="image/*" style="display:none"/>
          <button class="btn-clear" id="btn-clear-bg" style="display:none" onclick="clearBgImg()">제거</button>
        </div>
        <div id="bg-img-controls" style="display:none">
          <div class="form-row">
            <span class="form-label">배율</span>
            <input type="range" id="bg-scale" min="100" max="250" value="100"/>
            <span class="range-val" id="bg-scale-val">100%</span>
          </div>
          <div class="form-row">
            <span class="form-label">어둡기</span>
            <input type="range" id="bg-overlay" min="0" max="75" value="15"/>
            <span class="range-val" id="bg-overlay-val">15%</span>
          </div>
          <div class="img-palette" id="img-palette" style="display:none">
            <div class="palette-title">이미지 키컬러 (활성 그룹에 적용)</div>
            <div id="palette-rows"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 로고 -->
    <div class="ctrl-card">
      <div class="ctrl-header" onclick="toggleCard(this)">
        <span class="ctrl-header-title">로고</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body hidden">
        <div class="logo-grid" style="margin-bottom:8px">
          <div class="logo-opt">
            <input type="radio" name="logo" id="logo-none" value="none" checked/>
            <label for="logo-none">없음</label>
          </div>
          <div class="logo-opt">
            <input type="radio" name="logo" id="logo-seoul" value="seoul"/>
            <label for="logo-seoul">서울오리진</label>
          </div>
          <div class="logo-opt">
            <input type="radio" name="logo" id="logo-clinic" value="clinic"/>
            <label for="logo-clinic">본점 (clinic)</label>
          </div>
        </div>
        <div class="form-row">
          <span class="form-label">위치</span>
          <select id="logo-pos">
            <option value="bottom-center">하단 중앙</option>
            <option value="top-right">우측 상단</option>
            <option value="bottom-right">우측 하단</option>
            <option value="top-left">좌측 상단</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 강조 & 달력 -->
    <div class="ctrl-card">
      <div class="ctrl-header open" onclick="toggleCard(this)">
        <span class="ctrl-header-title">강조 그룹 &amp; 달력 편집</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body">
        <div class="hl-list" id="hl-list"></div>
        <button class="btn-add-hl" id="btn-add-hl" onclick="addHighlight()">+ 그룹 추가 (최대 5개)</button>
        <div class="cal-editor">
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>
    </div>

    <!-- 하단 텍스트 -->
    <div class="ctrl-card">
      <div class="ctrl-header" onclick="toggleCard(this)">
        <span class="ctrl-header-title">하단 텍스트</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body hidden">
        <textarea id="footer-text" placeholder="내용을 입력해주세요" maxlength="100" rows="2" style="resize:none;margin-bottom:7px;line-height:1.5"></textarea>
        <div class="form-row">
          <span class="form-label">색상</span>
          <input type="color" id="footer-color" class="swatch" value="#999999"/>
        </div>
        <div id="footer-color-chips" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;margin-top:2px;padding-left:52px"></div>
        <div class="form-row">
          <span class="form-label">크기</span>
          <input type="range" id="footer-size" min="8" max="20" value="11"/>
          <span class="range-val" id="footer-size-val">11</span>
        </div>
      </div>
    </div>

    <!-- 히스토리 -->
    <div class="ctrl-card">
      <div class="ctrl-header" onclick="toggleCard(this)">
        <span class="ctrl-header-title">히스토리</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body hidden">
        <button class="btn-save-hist" onclick="saveHistory()">현재 상태 저장</button>
        <div id="hist-list"></div>
      </div>
    </div>

    <!-- 내보내기 -->
    <div class="ctrl-card">
      <div class="ctrl-header open" onclick="toggleCard(this)">
        <span class="ctrl-header-title">내보내기</span>
        <span class="ctrl-chevron">›</span>
      </div>
      <div class="ctrl-body export-btns">
        <button class="btn-export"    onclick="exportImg('pc')">PC PNG · 2400 × 1800 (3×)</button>
        <button class="btn-export s2" onclick="exportImg('mo')">Mobile PNG · 1284 × 1620 (3×)</button>
        <button class="btn-export s3" onclick="exportPDF()">A4 PDF · 300dpi</button>
      </div>
    </div>

  </div>
</div>

<script>
// ─── SVG Logos ─────────────────────────────────────────────────────────────

let bgColor='#F5F0E7', bgImg=null, bgScale=1.0, bgOverlay=0.15;

// ─── Utilities ───────────────────────────────────────────────────────────────
function buildCells(y,m){const f=new Date(y,m-1,1).getDay(),l=new Date(y,m,0).getDate();const c=[];for(let i=0;i<f;i++)c.push(null);for(let i=1;i<=l;i++)c.push(i);while(c.length%7)c.push(null);return c;}
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function hexToHsl(hex){let{r,g,b}=hexToRgb(hex);r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let h=0,s=0,l=(mx+mn)/2;if(d>0){s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;}}return{h:h*360,s,l};}
function hslToHex(h,s,l){h/=360;const f=n=>{const k=(n+h*12)%12,a=s*Math.min(l,1-l);return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return rgbToHex(f(0)*255,f(8)*255,f(4)*255);}
function getColorVariants(hex){const{h,s,l}=hexToHsl(hex);return[-0.26,-0.13,0,+0.15,+0.28].map(dl=>hslToHex(h,s,Math.max(0.04,Math.min(0.93,l+dl))));}
function isColorLight(hex){return hexToHsl(hex).l>0.55;}

// ─── Logo loading ─────────────────────────────────────────────────────────
function loadSvgAsImg(svgStr){return new Promise(r=>{const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});const url=URL.createObjectURL(blob);const img=new Image();img.onload=()=>{URL.revokeObjectURL(url);r(img);};img.onerror=()=>{URL.revokeObjectURL(url);r(null);};img.src=url;});}

function getLogoImg(type,color){
  const key=type+'|'+color;
  if(logoCache[key])return logoCache[key]; // returns Promise (cached)
  let svg;
  if(type==='seoul')svg=svgSeoul(color);
  else if(type==='clinic')svg=svgClinic(color);
  else return Promise.resolve(null);
  logoCache[key]=loadSvgAsImg(svg); // store Promise, not result
  return logoCache[key];
}

async function prewarmLogos(){
  const colors=['#1a1a1a','#ffffff'];
  const types=['seoul','clinic'];
  await Promise.all(types.flatMap(t=>colors.map(c=>getLogoImg(t,c))));
}

// ─── Highlight helpers ────────────────────────────────────────────────────
function mk(){return`${year}-${month}`;}
function mDays(hl){const k=mk();if(!hl.daysByMonth[k])hl.daysByMonth[k]=new Set();return hl.daysByMonth[k];}
function getHlForDay(d){return highlights.find(h=>mDays(h).has(d))||null;}
function assignDay(d,id){highlights.forEach(h=>mDays(h).delete(d));const h=highlights.find(h=>h.id===id);if(h)mDays(h).add(d);}
function removeDay(d){highlights.forEach(h=>mDays(h).delete(d));}

// ─── Canvas Render (scale-aware) ──────────────────────────────────────────
async function renderCanvas(canvas,mode){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const baseW=mode==='mo'?428:mode==='pc'?889:800;
  const sc=W/baseW; // all sizes scale with canvas width

  const padX=Math.round(64*sc);
  const tSz=Math.round((mode==='mo'?Math.round(titleSz*.80):titleSz)*sc);
  const dowSz=Math.round((mode==='mo'?9:10)*sc);
  const rowH=Math.round((mode==='mo'?61:68)*sc);
  const colW=(W-padX*2)/7;
  const circR=Math.round((mode==='mo'?17:20)*sc);
  const dateSz=Math.round((mode==='mo'?19.5:22.5)*sc);
  const lblSz=Math.round((mode==='mo'?8.5:10)*sc);
  const fSz=Math.round((mode==='mo'?Math.round(footerSize*.85):footerSize)*sc);

  const autoFont=`'Cormorant Garamond','Pretendard','Noto Sans KR',sans-serif`;
  const uiFont=`-apple-system,'Pretendard','Noto Sans KR',sans-serif`;

  const cells=buildCells(year,month);
  const totalRows=cells.length/7;

  const gapTD=Math.round(42*sc);
  const gapDG=Math.round(19*sc);

  // Logo anchored to canvas bottom
  const botMargin=Math.round(22*sc);
  const lhPreview=Math.round(20*sc);
  const logoBottomY=H-botMargin; // logo bottom edge

  // Footer sits just above the logo (multi-line aware)
  const footerLines=footerText?footerText.split('\n'):[];
  const lineH=Math.round(fSz*1.55);
  const totalFooterH=footerLines.length>0?footerLines.length*lineH:0;
  const logoGap=Math.round(14*sc);
  const footerBotRef=logoType!=='none'?(logoBottomY-lhPreview-logoGap):(H-botMargin);

  // Grid centering: only title+dow+grid in contentH
  const contentH=tSz+gapTD+dowSz+gapDG+totalRows*rowH;
  const minPad=Math.round(32*sc);
  const topPad=Math.max(minPad,Math.floor((H-contentH)/2));

  const titleY=topPad+tSz/2;
  const dowY=topPad+tSz+gapTD+dowSz/2;
  const gridTop=topPad+tSz+gapTD+dowSz+gapDG;

  ctx.clearRect(0,0,W,H);

  // 1. Background
  if(bgImg){
    const ir=bgImg.naturalWidth/bgImg.naturalHeight,cr=W/H;
    let sw,sh;
    if(ir>cr){sh=H*bgScale;sw=sh*ir;}else{sw=W*bgScale;sh=sw/ir;}
    const off=bgOffset[mode]||{x:0,y:0};
    ctx.drawImage(bgImg,(W-sw)/2+off.x,(H-sh)/2+off.y,sw,sh);
    if(bgOverlay>0){ctx.fillStyle=`rgba(0,0,0,${bgOverlay})`;ctx.fillRect(0,0,W,H);}
  }else{
    ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
  }

  const onDark=!!bgImg;
  const autoText=bgImg?'#ffffff':isColorLight(bgColor)?'#1c1c1c':'#ffffff';

  // 2. Month title
  const MO_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  ctx.font=`300 ${tSz}px ${autoFont}`;
  ctx.fillStyle=autoText;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(MO_EN[month-1],W/2,titleY);

  // 3. Day headers
  const DAYS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  ctx.font=`500 ${dowSz}px ${autoFont}`;ctx.textBaseline='middle';
  DAYS.forEach((d,i)=>{
    ctx.fillStyle=i===0?(onDark?'#ff9999':'#C0392B'):(onDark?'rgba(255,255,255,.55)':'#bbb');
    ctx.textAlign='center';
    ctx.fillText(d,padX+i*colW+colW/2,dowY);
  });

  // 4. Capsules / circles
  for(const hl of highlights){
    for(let row=0;row<totalRows;row++){
      let sc2=-1,ec=-1;
      const flush=()=>{
        if(sc2<0)return;
        const cx1=padX+sc2*colW+colW/2,cx2=padX+ec*colW+colW/2,cy=gridTop+row*rowH+circR;
        ctx.fillStyle=hl.color;
        if(ec>sc2){
          ctx.beginPath();ctx.moveTo(cx1,cy-circR);ctx.lineTo(cx2,cy-circR);
          ctx.arc(cx2,cy,circR,-Math.PI/2,Math.PI/2);
          ctx.lineTo(cx1,cy+circR);ctx.arc(cx1,cy,circR,Math.PI/2,3*Math.PI/2);
          ctx.closePath();ctx.fill();
          const mx=(cx1+cx2)/2,ly=cy+circR+Math.round(5*sc);
          ctx.font=`600 ${lblSz}px ${uiFont}`;
          ctx.fillStyle=onDark?'rgba(255,255,255,.85)':hl.color;
          ctx.textAlign='center';ctx.textBaseline='top';
          hl.label.split(' ').forEach((ln,li)=>ctx.fillText(ln,mx,ly+li*(lblSz+2)));
        }else{
          ctx.beginPath();ctx.arc(cx1,cy,circR,0,Math.PI*2);ctx.fill();
          const ly=cy+circR+Math.round(5*sc);
          ctx.font=`600 ${lblSz}px ${uiFont}`;
          ctx.fillStyle=onDark?'rgba(255,255,255,.85)':hl.color;
          ctx.textAlign='center';ctx.textBaseline='top';
          hl.label.split(' ').forEach((ln,li)=>ctx.fillText(ln,cx1,ly+li*(lblSz+2)));
        }
        sc2=-1;ec=-1;
      };
      for(let col=0;col<7;col++){
        const day=cells[row*7+col];
        if(day&&mDays(hl).has(day)){if(sc2<0)sc2=col;ec=col;}else flush();
      }
      flush();
    }
  }

  // 5. Date numbers
  cells.forEach((day,idx)=>{
    if(!day)return;
    const row=Math.floor(idx/7),col=idx%7;
    const cx=padX+col*colW+colW/2,cy=gridTop+row*rowH+circR;
    const hl=getHlForDay(day);
    let dc;
    if(hl)dc='#fff';
    else if(onDark)dc=col===0?'#ffaaaa':'rgba(255,255,255,.88)';
    else dc=col===0?'#C0392B':autoText;
    ctx.font=`${hl?'700':'400'} ${dateSz}px ${autoFont}`;
    ctx.fillStyle=dc;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(day),cx,cy);
  });

  // 6. Logo
  // 7. Footer — multi-line, anchored from bottom
  if(footerLines.length>0){
    ctx.font=`400 ${fSz}px ${autoFont}`;
    ctx.fillStyle=onDark?'rgba(255,255,255,.5)':footerColor;
    ctx.textAlign='center';ctx.textBaseline='middle';
    footerLines.forEach((line,i)=>{
      const ly=footerBotRef-totalFooterH+lineH*i+lineH/2;
      ctx.fillText(line,W/2,ly);
    });
  }

  // 8. Logo — bottom anchored above footer, top anchored near top edge
  if(logoType!=='none'){
    const logoColor=bgImg?'#ffffff':isColorLight(bgColor)?'#1a1a1a':'#ffffff';
    const li=await getLogoImg(logoType,logoColor);
    if(li&&li.naturalWidth>0){
      const asp=li.naturalWidth/li.naturalHeight;
      const lh=lhPreview;
      const lw=lh*asp;
      let lx,ly;
      switch(logoPos){
        case 'top-right':    lx=W-padX-lw; ly=Math.round(24*sc); break;
        case 'bottom-right': lx=W-padX-lw; ly=logoBottomY-lhPreview;  break;
        case 'top-left':     lx=padX;       ly=Math.round(24*sc); break;
        default:             lx=W/2-lw/2;   ly=logoBottomY-lhPreview;  // bottom-center
      }
      ctx.globalAlpha=0.88;
      ctx.drawImage(li,lx,ly,lw,lh);
      ctx.globalAlpha=1;
    }
  }
}

function updatePreviewSizes(){
  const sw=Math.max(previewStage.clientWidth,300);

  const pcW=Math.min(sw,900),pcH=Math.round(600*pcW/800);
  pcBox.style.width=pcW+'px';pcBox.style.height=pcH+'px';
  canvasPC.style.transform=`scale(${pcW/800})`;
  // Mobile — centered, ~55% width
  const moW=Math.min(Math.round(sw*.55),428),moH=Math.round(540*moW/428);
  moBox.style.width=moW+'px';moBox.style.height=moH+'px';
  canvasMO.style.transform=`scale(${moW/428})`;
  // A4 — centered, ~42% width
  const a4W=Math.min(Math.round(sw*.42),420),a4H=Math.round(594*a4W/420);
  a4Box.style.width=a4W+'px';a4Box.style.height=a4H+'px';
  canvasA4.style.transform=`scale(${a4W/420})`;
}

  calGrid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach((d,i)=>{
    const el=document.createElement('div');el.className='cal-dow';
    el.style.color=i===0?'#C0392B':i===6?'#7fb3d3':'#c7c7cc';
    el.textContent=d;calGrid.appendChild(el);
  });
  buildCells(year,month).forEach((day,idx)=>{

    if(!day){el.className='cal-cell empty';calGrid.appendChild(el);return;}
    el.dataset.day=day;
    const hl=getHlForDay(day);
    el.className='cal-cell';
    el.style.background=hl?hl.color+'33':'#f5f5f7';
    const num=document.createElement('span');num.className='day-num';
    num.style.color=hl?hl.color:col===0?'#C0392B':'#1d1d1f';
    num.textContent=day;el.appendChild(num);
    if(hl){const b=document.createElement('span');b.className='day-badge';b.style.color=hl.color;b.textContent=hl.label.slice(0,4);el.appendChild(b);}
    calGrid.appendChild(el);
  });
  const ahl=highlights.find(h=>h.id===activeHlId);
}

calGrid.addEventListener('click',e=>{
  const cell=e.target.closest('.cal-cell[data-day]');if(!cell)return;
  const day=+cell.dataset.day,ahl=highlights.find(h=>h.id===activeHlId);

// ─── Highlight list UI ────────────────────────────────────────────────────
function renderHlList(){
  const list=document.getElementById('hl-list');
  list.innerHTML='';
  highlights.forEach(hl=>{
    const item=document.createElement('div');
    item.className='hl-item'+(hl.id===activeHlId?' active':'');
    item.innerHTML=`
      <div class="hl-top">
        <input type="color" class="swatch" value="${hl.color}" title="색상"/>
        <input class="hl-label-inp" type="text" value="${hl.label}" placeholder="라벨" maxlength="12"/>
        <button class="btn-del">×</button>
      </div>
      <div class="hl-meta">
        <button class="btn-eye">🔍 스포이드</button>
        <span class="hl-count">${mDays(hl).size}일</span>
      </div>`;
    item.addEventListener('click',ev=>{if(ev.target.classList.contains('btn-del'))return;activeHlId=hl.id;renderHlList();renderCalEditor();});
    const ci=item.querySelector('input[type=color]');
    ci.addEventListener('input',ev=>{hl.color=ev.target.value;renderHlList();renderCalEditor();redrawAll();});
    ci.addEventListener('click',ev=>ev.stopPropagation());

    item.querySelector('.hl-label-inp').addEventListener('click',ev=>ev.stopPropagation());
    item.querySelector('.btn-del').addEventListener('click',ev=>{
      ev.stopPropagation();if(highlights.length<=1)return;
      highlights=highlights.filter(h=>h.id!==hl.id);
      if(activeHlId===hl.id)activeHlId=highlights[0].id;
      renderHlList();renderCalEditor();redrawAll();
    });
    item.querySelector('.btn-eye').addEventListener('click',async ev=>{
      ev.stopPropagation();

      try{const r=await new EyeDropper().open();hl.color=r.sRGBHex;renderHlList();renderCalEditor();redrawAll();}catch(e){}
    });

function addHighlight(){
  if(highlights.length>=5)return;
  const cols=['#2980b9','#27ae60','#8e44ad','#e67e22','#16a085'];
  const hl={id:nextHlId++,label:`그룹${highlights.length+1}`,color:cols[highlights.length%cols.length],daysByMonth:{}};
  highlights.push(hl);activeHlId=hl.id;

}

// ─── Background image ─────────────────────────────────────────────────────
function extractColors(img,n=5){
  const c=document.createElement('canvas');c.width=c.height=80;
  const x=c.getContext('2d');x.drawImage(img,0,0,80,80);
  const d=x.getImageData(0,0,80,80).data,freq={};
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<128)continue;
    const r=Math.round(d[i]/20)*20,g=Math.round(d[i+1]/20)*20,b=Math.round(d[i+2]/20)*20;
    const k=`${r},${g},${b}`;freq[k]=(freq[k]||0)+1;
  }
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const result=[];
  for(const[k]of sorted){
    if(result.length>=n)break;
    const[r,g,b]=k.split(',').map(Number),hex=rgbToHex(r,g,b);
    const close=result.some(ex=>{const e=hexToRgb(ex);return Math.abs(r-e.r)+Math.abs(g-e.g)+Math.abs(b-e.b)<55;});
    if(!close)result.push(hex);
  }
  return result;
}

function renderPalette(colors){
  const wrap=document.getElementById('palette-rows');wrap.innerHTML='';
  colors.forEach(base=>{

  document.getElementById('img-palette').style.display='block';
}

function setupPan(box,mode){
  let drag=false,sx=0,sy=0,ox=0,oy=0;
  box.addEventListener('mousedown',e=>{if(!bgImg)return;drag=true;sx=e.clientX;sy=e.clientY;ox=bgOffset[mode].x;oy=bgOffset[mode].y;box.style.cursor='grabbing';e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!drag)return;bgOffset[mode].x=ox+(e.clientX-sx);bgOffset[mode].y=oy+(e.clientY-sy);redrawAll();});
  document.addEventListener('mouseup',()=>{drag=false;box.style.cursor='';});
}

async function exportImg(mode){
  const SCALE=3;
  const[bW,bH]=mode==='pc'?[800,600]:[428,540];
  const c=document.createElement('canvas');
  c.width=bW*SCALE;c.height=bH*SCALE;
  await renderCanvas(c,mode);
  const a=document.createElement('a');
  a.href=c.toDataURL('image/png');
  a.download=`${year}년_${month}월_캘린더_${mode==='pc'?'PC':'MO'}.png`;
  a.click();
}

async function exportPDF(){
  const A4W=2480,A4H=3508;
  const c=document.createElement('canvas');c.width=A4W;c.height=A4H;
  await renderCanvas(c,'a4');
  const imgData=c.toDataURL('image/jpeg',0.93);
  if(window.jspdf){
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    doc.addImage(imgData,'JPEG',0,0,210,297);
    doc.save(`${year}년_${month}월_캘린더_A4.pdf`);
  }else{
    // fallback: open image in new tab → print → save as PDF
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>A4 Calendar</title><style>body{margin:0}img{width:100%;display:block}</style></head><body><img src="${imgData}"/></body></html>`);
    w.document.close();w.print();
  }
}

// ─── History ──────────────────────────────────────────────────────────────
const HIST_KEY='obliv_cal_history';
function getHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch(e){return[];}}

function saveHistory(){
  const hist=getHistory();
  const snap={
    id:Date.now(),
    label:`${year}년 ${month}월`,
    time:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    year,month,titleSz,bgColor,bgOverlay,bgScale,
    logoType,logoPos,footerText,footerColor,footerSize,
    highlights:highlights.map(h=>({...h,daysByMonth:Object.fromEntries(Object.entries(h.daysByMonth).map(([k,v])=>[k,[...v]]))}))
  };
  hist.unshift(snap);
  if(hist.length>20)hist.length=20;
  localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  renderHistList();
}

function loadHistory(id){
  const snap=getHistory().find(h=>h.id===id);
  if(!snap)return;
  year=snap.year;month=snap.month;titleSz=snap.titleSz;
  bgColor=snap.bgColor;bgOverlay=snap.bgOverlay;bgScale=snap.bgScale;
  logoType=snap.logoType;logoPos=snap.logoPos;
  footerText=snap.footerText;footerColor=snap.footerColor;footerSize=snap.footerSize;
  highlights=snap.highlights.map(h=>({...h,daysByMonth:Object.fromEntries(Object.entries(h.daysByMonth||{}).map(([k,v])=>[k,new Set(v)]))}));
  activeHlId=highlights[0]?.id||1;
  document.getElementById('sel-year').value=year;
  document.getElementById('sel-month').value=month;
  document.getElementById('title-size').value=titleSz;
  document.getElementById('title-size-val').textContent=titleSz;
  document.getElementById('bg-color').value=bgColor;
  document.getElementById('bg-overlay').value=Math.round(bgOverlay*100);
  document.getElementById('bg-overlay-val').textContent=Math.round(bgOverlay*100)+'%';
  document.getElementById('bg-scale').value=Math.round(bgScale*100);
  document.getElementById('bg-scale-val').textContent=Math.round(bgScale*100)+'%';
  document.getElementById('logo-pos').value=logoPos;
  document.querySelectorAll('input[name=logo]').forEach(r=>r.checked=(r.value===logoType));
  document.getElementById('footer-text').value=footerText;
  document.getElementById('footer-color').value=footerColor;
  document.getElementById('footer-size').value=footerSize;
  document.getElementById('footer-size-val').textContent=footerSize;
  renderHlList();renderCalEditor();redrawAll();
}

function deleteHistory(id){
  const hist=getHistory().filter(h=>h.id!==id);
  localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  renderHistList();
}

function renderHistList(){
  const list=document.getElementById('hist-list');
  const hist=getHistory();
  if(!hist.length){list.innerHTML='<div class="hist-empty">저장된 히스토리가 없습니다</div>';return;}
  list.innerHTML='';
  hist.forEach(h=>{
    const item=document.createElement('div');item.className='hist-item';
    item.innerHTML=`<div class="hist-info"><span class="hist-label">${h.label}</span><span class="hist-time">${h.time}</span></div><div class="hist-btns"><button onclick="loadHistory(${h.id})">불러오기</button><button class="del" onclick="deleteHistory(${h.id})">삭제</button></div>`;
    list.appendChild(item);
  });
}
