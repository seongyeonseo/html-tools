<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>르샤인 카드사별 할부 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --primary:     #1010FF;
  --primary-hov: #0a0acc;
  --pri-alpha:   rgba(16,16,255,.07);
  --pri-border:  rgba(16,16,255,.16);
  --ui-bg:       #F2F4F6;
  --ui-panel:    #ffffff;
  --ui-border:   #E5E8EB;
  --ui-hi:       #191F28;
  --ui-md:       #6B7684;
  --ui-lo:       #8B95A1;
  --ui-surface:  #F7F8FA;
  --topbar-h:    56px;
  --sidebar-w:   300px;
  --pb:          #f3f3f3;
  --pb-border:   #3A3D2A;
  --pb-label:    #144f3e;
  --pb-title:    #144f3e;
  --pb-divider:  #CCC4B6;
  --pb-cname:    #144f3e;
  --pb-cnum:     #144f3e;
  --pb-cond:     #144f3e;
  --pb-note:     #144f3e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Pretendard", -apple-system, sans-serif;
  background: var(--ui-bg);
  color: var(--ui-hi);
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── 탑바 */
.topbar {
  height: var(--topbar-h);
  background: var(--ui-panel);
  border-bottom: 1px solid var(--ui-border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 10px;
  flex-shrink: 0; position: relative; z-index: 100;
}
.tb-space { flex: 1; }

/* ── 스플릿 버튼 */
.split { display: flex; border-radius: 9px; overflow: hidden; flex-shrink: 0; }
.split.save { border: 1px solid var(--ui-border); }
.split.save .s-main {
  height: 36px; padding: 0 14px;
  background: var(--ui-surface); color: var(--ui-hi);
  border: none; border-right: 1px solid var(--ui-border);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .12s;
}
.split.save .s-main:hover { background: var(--ui-border); }
.split.save .s-arr {
  height: 36px; width: 34px; background: var(--ui-surface);
  border: none; color: var(--ui-lo);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.split.save .s-arr:hover { background: var(--ui-border); color: var(--ui-hi); }
.split.save.open .s-arr { background: var(--ui-border); color: var(--ui-hi); }
.split.export { border: 1px solid var(--primary); margin-left: 8px; }
.split.export .s-main {
  height: 36px; padding: 0 14px;
  background: var(--primary); color: #fff;
  border: none; border-right: 1px solid rgba(255,255,255,.2);
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .12s;
}
.split.export .s-main:hover { background: var(--primary-hov); }
.split.export .s-arr {
  height: 36px; width: 34px; background: var(--primary);
  border: none; color: rgba(255,255,255,.7);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.split.export .s-arr:hover { background: var(--primary-hov); }
.split.export.open .s-arr { background: #0808cc; }

/* ── 드롭다운 */
.dropdown {
  position: absolute; top: calc(var(--topbar-h) + 4px);
  background: var(--ui-panel); border: 1px solid var(--ui-border);
  border-radius: 14px; box-shadow: 0 8px 28px rgba(0,0,0,.12);
  z-index: 200; overflow: hidden; display: none;
}
.dropdown.open { display: block; }
.dd-head {
  padding: 11px 17px; border-bottom: 1px solid var(--ui-border);
  font-size: 11px; font-weight: 700; color: var(--ui-md);
  text-transform: uppercase; letter-spacing: .5px;
}
.dd-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 17px; border-bottom: 1px solid var(--ui-border);
  cursor: pointer; transition: background .1s;
}
.dd-item:last-child { border-bottom: none; }
.dd-item:hover { background: var(--ui-surface); }
.dd-item-label { font-size: 13px; font-weight: 600; color: var(--ui-hi); }
.dd-item-desc { font-size: 11px; color: var(--ui-lo); margin-top: 1px; }
.dd-default {
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 8px;
  background: #E8FAF4; color: #048848; flex-shrink: 0;
}
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 17px; border-bottom: 1px solid var(--ui-border);
  cursor: pointer; transition: background .1s;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:hover { background: var(--ui-surface); }
.hist-thumb { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; }
.hist-info { flex: 1; min-width: 0; }
.hist-name { font-size: 13px; font-weight: 600; color: var(--ui-hi); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-time { font-size: 11px; color: var(--ui-lo); margin-top: 2px; }
.hist-restore {
  flex-shrink: 0; font-size: 11px; font-weight: 600;
  color: var(--primary); background: var(--pri-alpha);
  border: 1px solid var(--pri-border);
  padding: 4px 10px; border-radius: 8px; cursor: pointer;
}
.hist-restore:hover { background: rgba(16,16,255,.14); }
.hist-empty { padding: 20px 17px; font-size: 13px; color: var(--ui-lo); text-align: center; }
.dd-footer { padding: 10px 17px; border-top: 1px solid var(--ui-border); }
.dd-footer-btn {
  width: 100%; height: 34px; border: 1px solid var(--ui-border);
  border-radius: 8px; background: none;
  font-size: 12px; font-weight: 600; color: var(--ui-md);
  cursor: pointer; font-family: inherit; transition: background .12s;
}
.dd-footer-btn:hover { background: var(--ui-surface); color: var(--ui-hi); }

/* ── 메인 레이아웃 */
.main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── 캔버스 영역 */
.canvas-area {
  flex: 1; min-width: 0; min-height: 0;
  overflow-y: auto; overflow-x: auto;
  background: var(--ui-bg);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 40px;
}
.canvas-area::-webkit-scrollbar { width: 6px; height: 6px; }
.canvas-area::-webkit-scrollbar-thumb { background: #C8CDD6; border-radius: 3px; }

/* ── 리사이즈 핸들 */
.resize-handle {
  width: 4px; flex-shrink: 0;
  background: transparent; border-left: 1px solid var(--ui-border);
  cursor: col-resize; position: relative; transition: background .12s; user-select: none;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--pri-alpha); border-left-color: var(--primary); }
.resize-handle::after {
  content: ""; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 2px; height: 28px; border-radius: 2px; background: var(--ui-border);
}
.resize-handle:hover::after, .resize-handle.dragging::after { background: var(--primary); }

/* ── 사이드바 */
.sidebar {
  width: var(--sidebar-w); min-width: 200px; max-width: 520px;
  background: var(--ui-panel);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.tab-bar { display: flex; border-bottom: 1px solid var(--ui-border); flex-shrink: 0; }
.tab-btn {
  flex: 1; height: 44px; border: none; background: none;
  font-size: 13px; font-weight: 600; color: var(--ui-md);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; font-family: inherit; transition: color .12s;
}
.tab-btn.on { color: var(--primary); border-bottom-color: var(--primary); }
.tab-body { flex: 1; overflow-y: auto; }
.tab-body::-webkit-scrollbar { width: 3px; }
.tab-body::-webkit-scrollbar-thumb { background: #D8DADF; border-radius: 2px; }

/* ── 아코디언 */
.acc { border-bottom: 1px solid var(--ui-border); }
.acc:last-child { border-bottom: none; }
.acc-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 17px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--ui-hi);
  transition: background .1s; user-select: none; gap: 10px;
}
.acc-head:hover { background: var(--ui-surface); }
.acc-head.open { color: var(--primary); }
.acc-head.hidden-card { opacity: 0.4; }
.acc-title { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.acc-logo { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.acc-logo svg { width: 22px; height: 22px; }
.acc-arr { flex-shrink: 0; color: var(--ui-lo); transition: transform .15s; }
.acc-arr.r { transform: rotate(180deg); color: var(--primary); }
.acc-toggle {
  flex-shrink: 0; width: 32px; height: 18px; border-radius: 9px;
  background: var(--ui-border); border: none; cursor: pointer;
  position: relative; transition: background .18s; padding: 0;
}
.acc-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; transition: left .18s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.acc-toggle.on { background: var(--primary); }
.acc-toggle.on::after { left: 16px; }
.acc-body { padding: 2px 17px 14px; }
.acc-body.closed { display: none; }
.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--ui-md); margin-bottom: 5px;
}
.field input[type="text"], .field textarea {
  width: 100%; border: 1px solid var(--ui-border); border-radius: 8px;
  padding: 9px 11px; font-size: 13px; font-family: "Pretendard", sans-serif;
  color: var(--ui-hi); background: var(--ui-surface);
  resize: vertical; line-height: 1.6; outline: none;
  transition: border-color .12s; letter-spacing: -.04em;
}
.field input:focus, .field textarea:focus { border-color: var(--primary); background: #fff; }
.field textarea { min-height: 60px; resize: none; overflow: hidden; }
.field-hint { font-size: 11px; color: var(--ui-lo); margin-bottom: 6px; }

/* ── 포스터 */
#poster-canvas {
  width: 559px;
  height: 794px;
  background: var(--pb);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  box-shadow: 0 4px 24px rgba(0,0,0,.14);
}
.poster-inner {
  padding: 20px 26px 18px;
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* 헤더 */
.poster-label {
  font-size: 13pt; font-weight: 600;
  color: var(--pb-label); letter-spacing: -0.04em;
  text-align: center; margin-top: 5mm; margin-bottom: 7px;
}
.poster-title {
  font-size: 38px; font-weight: 800;
  color: var(--pb-title); line-height: 1.18;
  text-align: center; letter-spacing: -0.03em;
  margin-bottom: 12px;
}
.poster-subtitle-wrap {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 10px;
}
.poster-line { flex: 1; height: 1.5px; background: var(--pb-border); }
.poster-subtitle-text {
  font-size: 13pt; font-weight: 700;
  color: #144f3e; letter-spacing: -0.04em; white-space: nowrap;
}

/* 카드 리스트 */
.poster-card-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-top: 2.5px solid var(--pb-border);
  border-bottom: 2.5px solid var(--pb-border);
  overflow: hidden;
  min-height: 0;
}
#card-rows-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 0;
  transform-origin: top left;
}
.card-row {
  display: flex;
  align-items: center;
  padding: 6px 4px 6px 2px;
  position: relative;
}
.card-row + .card-row::before {
  content: "";
  position: absolute; top: 0; left: 8px; right: 8px;
  height: 0.5px; background: var(--pb-divider);
}
.card-left-group {
  width: 244px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: flex-start;
  padding-left: 46px;
}
.card-logo-wrap {
  width: 52px; height: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.card-logo-wrap svg { display: block; }
.card-logo-wrap img { display: block; max-width: 46px; max-height: 38px; object-fit: contain; }
.card-info {
  flex-shrink: 0; padding-left: 6px;
}
.card-name {
  font-size: 14pt; font-weight: 700;
  color: var(--pb-cname); letter-spacing: -0.03em;
}
.card-number {
  font-size: 9pt; font-weight: 500;
  color: var(--pb-cnum); letter-spacing: 0.01em; margin-top: 2px;
}
.card-right {
  flex: 1; padding-left: 8px;
  display: flex; flex-direction: column; justify-content: center;
  min-width: 0;
}
.card-conditions { display: flex; flex-direction: column; }
.card-condition {
  font-size: 9pt; font-weight: 500;
  color: var(--pb-cond); line-height: 1.6;
  letter-spacing: -0.02em;
}
.card-note {
  font-size: 7.5pt; font-weight: 400;
  color: var(--pb-note); margin-top: 1px;
  letter-spacing: 0; align-self: flex-end;
}

/* 푸터 */
.poster-footer {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding-top: 8px; height: 52px;
}
.footer-logo-group {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.footer-logo-group svg { height: 23px; width: auto; }
.footer-clinic {
  font-size: 7px; font-weight: 600;
  color: #144f3e; letter-spacing: 0.28em;
  padding-left: 0.28em;
}
</style>
</head>
<body>

<!-- ── 탑바 -->
<div class="topbar">
  <div class="tb-space"></div>

  <div class="split save" id="split-save">
    <button class="s-main" onclick="saveSnapshot()">저장</button>
    <button class="s-arr" onclick="toggleDropdown('dd-history','split-save')">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 3l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="split export" id="split-export">
    <button class="s-main" onclick="exportPDF()">PDF 내보내기</button>
    <button class="s-arr" onclick="toggleDropdown('dd-export','split-export')">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 3l3 3 3-3" stroke="rgba(255,255,255,.8)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="dropdown" id="dd-history" style="right:136px; width:244px;">
    <div class="dd-head">저장 히스토리</div>
    <div id="dd-history-list"><div class="hist-empty">저장된 기록이 없습니다</div></div>
    <div class="dd-footer">
      <button class="dd-footer-btn" onclick="clearHistory()">기록 전체 삭제</button>
    </div>
  </div>

  <div class="dropdown" id="dd-export" style="right:16px; width:230px;">
    <div class="dd-head">내보내기 형식</div>
    <div class="dd-item" onclick="exportPDF(); closeDropdowns();">
      <div><div class="dd-item-label">PDF — 인쇄용</div><div class="dd-item-desc">A5 · 148×210mm</div></div>
      <span class="dd-default">기본</span>
    </div>
  </div>
</div>

<!-- ── 메인 레이아웃 -->
<div class="main-layout">

  <!-- 캔버스 -->
  <div class="canvas-area">
    <div id="poster-canvas">
      <div class="poster-inner">

        <div class="poster-label">르샤인 제휴카드 혜택</div>
        <div class="poster-title">신용카드 카드사별<br>할부 안내</div>
        <div class="poster-subtitle-wrap">
          <div class="poster-subtitle-text">◆ 카드사별 할부 조건 ◆</div>
        </div>

        <div class="poster-card-list" id="poster-card-list"></div>

        <div class="poster-footer">
          <div class="footer-logo-group">

/* ── 헬퍼 */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
var LS_KEY = 'ls_install';
function lsGet(k, def){ var v=localStorage.getItem(LS_KEY+'_'+k); return v!==null?v:def; }
function lsSet(k, v){ localStorage.setItem(LS_KEY+'_'+k, v); }

/* ── 포스터 렌더 */
function renderPoster() {
  var list = document.getElementById('poster-card-list');
  list.innerHTML = '<div id="card-rows-wrap">' + CARDS.filter(function(c) {
    return lsGet(c.id+'_visible', '1') === '1';
  }).map(function(c) {
    var name  = lsGet(c.id+'_name', c.name);
    var num   = lsGet(c.id+'_num',  c.number);
    var cond  = lsGet(c.id+'_cond', c.conditions);
    var note  = lsGet(c.id+'_note', c.note);
    var lines = cond.split('\n').filter(function(l){ return l.trim(); });
    return '<div class="card-row">'
      + '<div class="card-left-group">'
        + '<div class="card-logo-wrap">' + LOGOS[c.id] + '</div>'
        + '<div class="card-info">'
          + '<div class="card-name">' + esc(name) + '</div>'
          + (num ? '<div class="card-number">' + esc(num) + '</div>' : '')
        + '</div>'
      + '</div>'
      + '<div class="card-right">'
        + '<div class="card-conditions">'
        + lines.map(function(l){ return '<div class="card-condition">'+esc(l)+'</div>'; }).join('')
        + '</div>'
        + (note ? '<div class="card-note">'+esc(note)+'</div>' : '')
      + '</div>'
    + '</div>';
  }).join('') + '</div>';
  fitCardList();
}

function fitCardList() {
  requestAnimationFrame(function() {
    var list = document.getElementById('poster-card-list');
    var wrap = document.getElementById('card-rows-wrap');
    if (!list || !wrap) return;

    // 초기화
    wrap.style.transform = '';
    wrap.style.width = '';

    // 사용 가능한 높이/너비 (overflow:hidden인 list 기준 → 항상 일정)
    var availH = list.clientHeight;
    var availW = list.clientWidth;
    if (availH <= 0) return;

    // 자연 높이 측정: wrap을 일시적으로 flex 해제 → 내용 높이 그대로
    wrap.style.flex = 'none';
    wrap.style.height = 'auto';

    var naturalH = wrap.scrollHeight;

    // 원상복구 (인라인 스타일 제거 → CSS flex:1 복귀)
    wrap.style.flex = '';
    wrap.style.height = '';

    if (naturalH <= availH || naturalH <= 0) return;

    // 스케일 적용
    var scale = availH / naturalH;
    wrap.style.width = (availW / scale) + 'px';   // 가로 폭 보정
    wrap.style.transform = 'scale(' + scale.toFixed(4) + ')';
    wrap.style.transformOrigin = 'top left';
  });
}

/* ── 사이드바 빌드 */
function buildSidebar() {
  var body = document.getElementById('sidebar-body');
  body.innerHTML = CARDS.map(function(c) {
    var name = lsGet(c.id+'_name', c.name);
    var num  = lsGet(c.id+'_num',  c.number);
    var cond = lsGet(c.id+'_cond', c.conditions);
    var note = lsGet(c.id+'_note', c.note);
    var visible = lsGet(c.id+'_visible', '1') === '1';
    return '<div class="acc">'
      + '<div class="acc-head' + (visible ? '' : ' hidden-card') + '" onclick="toggleAcc(this)">'
      + '<div class="acc-title"><div class="acc-logo">'+LOGOS_SM[c.id]+'</div><span>'+esc(c.name)+'</span></div>'
      + '<button class="acc-toggle' + (visible ? ' on' : '') + '" onclick="toggleCardVisible(event,\''+c.id+'\',this)" title="포스터에 표시/숨김"></button>'
      + '<svg class="acc-arr" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + '</div>'
      + '<div class="acc-body closed">'
        + '<div class="field"><label>카드명</label>'
        + '<input type="text" id="in-'+c.id+'-name" value="'+esc(name)+'" oninput="update(\''+c.id+'\',\'name\',this.value)"></div>'
        + '<div class="field"><label>전화번호 <span style="color:var(--ui-lo);font-weight:400">(선택)</span></label>'
        + '<input type="text" id="in-'+c.id+'-num" value="'+esc(num)+'" oninput="update(\''+c.id+'\',\'num\',this.value)"></div>'
        + '<div class="field"><label>할부 조건</label>'
        + '<div class="field-hint">Enter로 항목 구분</div>'
        + '<textarea id="in-'+c.id+'-cond" rows="3" oninput="autoResize(this);update(\''+c.id+'\',\'cond\',this.value)">'+esc(cond)+'</textarea></div>'
        + '<div class="field"><label>비고 <span style="color:var(--ui-lo);font-weight:400">(선택)</span></label>'
        + '<input type="text" id="in-'+c.id+'-note" value="'+esc(note)+'" oninput="update(\''+c.id+'\',\'note\',this.value)"></div>'
      + '</div>'
    + '</div>';
  }).join('');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}

function update(id, field, val) {
  lsSet(id+'_'+field, val);
  renderPoster();
}

/* ── 카드 표시/숨김 토글 */
function toggleCardVisible(e, id, btn) {
  e.stopPropagation();
  var visible = lsGet(id+'_visible', '1') === '1';
  var newVal = visible ? '0' : '1';
  lsSet(id+'_visible', newVal);
  btn.classList.toggle('on', !visible);
  var head = btn.closest('.acc-head');
  head.classList.toggle('hidden-card', visible);
  renderPoster();
}

/* ── 아코디언 */
function toggleAcc(head) {
  var body = head.nextElementSibling;
  var arr  = head.querySelector('.acc-arr');
  var open = !body.classList.contains('closed');
  if (open) { body.classList.add('closed'); head.classList.remove('open'); arr.classList.remove('r'); }
  else       { body.classList.remove('closed'); head.classList.add('open'); arr.classList.add('r'); }
}

/* ── 드롭다운 */
function toggleDropdown(ddId, splitId) {
  var dd = document.getElementById(ddId);
  var sp = document.getElementById(splitId);
  var isOpen = dd.classList.contains('open');
  closeDropdowns();
  if (!isOpen) { dd.classList.add('open'); sp.classList.add('open'); }
}
function closeDropdowns() {
  document.querySelectorAll('.dropdown').forEach(function(d){ d.classList.remove('open'); });
  document.querySelectorAll('.split').forEach(function(s){ s.classList.remove('open'); });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.split') && !e.target.closest('.dropdown')) closeDropdowns();
});

/* ── 사이드바 리사이즈 */
(function() {

  var sidebar = document.getElementById('sidebar');
  var KEY = 'ls_install_sidebar_w', MIN_W = 180, MAX_W = 460;
  var saved = parseInt(localStorage.getItem(KEY));
  if (saved && saved >= MIN_W && saved <= MAX_W) sidebar.style.width = saved + 'px';
  var dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', function(e) {
    dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var delta = startX - e.clientX;
    var newW = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
    sidebar.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false; handle.classList.remove('dragging');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
    localStorage.setItem(KEY, sidebar.offsetWidth);
  });
})();

/* ── 저장 히스토리 */
var HIST_KEY = 'ls_install_history';
function getHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e) { return []; } }
function saveSnapshot() {
  var data = {};
  CARDS.forEach(function(c) {
    ['name','num','cond','note'].forEach(function(f) {
      data[c.id+'_'+f] = lsGet(c.id+'_'+f, '');
    });
  });
  var hist = getHistory();
  hist.unshift({ time: Date.now(), label: lsGet('nonghyup_name','할부 안내'), data: data });
  if (hist.length > 10) hist = hist.slice(0, 10);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  renderHistoryList();
  var btn = document.querySelector('#split-save .s-main');
  var orig = btn.textContent;
  btn.textContent = '저장됨'; btn.style.color = '#048848';
  setTimeout(function() { btn.textContent = orig; btn.style.color = ''; }, 1200);
}
function restoreSnapshot(idx) {
  var h = getHistory()[idx]; if (!h) return;
  Object.keys(h.data).forEach(function(k) { localStorage.setItem(LS_KEY+'_'+k, h.data[k]); });
  buildSidebar(); renderPoster(); closeDropdowns();
}
function clearHistory() { localStorage.removeItem(HIST_KEY); renderHistoryList(); }
function renderHistoryList() {
  var hist = getHistory(), list = document.getElementById('dd-history-list');
  if (!hist.length) { list.innerHTML = '<div class="hist-empty">저장된 기록이 없습니다</div>'; return; }
  var COLORS = ['linear-gradient(135deg,#e8e8ff,#c0c0ff)','linear-gradient(135deg,#d8f5e8,#9ae8c0)','linear-gradient(135deg,#fdecd8,#f8c4a0)'];
  list.innerHTML = hist.map(function(h, i) {
    var d = new Date(h.time);
    var t = d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    return '<div class="hist-item">'
      + '<div class="hist-thumb" style="background:'+COLORS[i%3]+'"></div>'
      + '<div class="hist-info"><div class="hist-name">'+esc(h.label)+'</div><div class="hist-time">'+t+'</div></div>'
      + '<div class="hist-restore" onclick="restoreSnapshot('+i+')">불러오기</div>'
    + '</div>';
  }).join('');
}

/* ── 내보내기 (A5 PDF) */
async function exportPDF() {
  var btn = document.querySelector('#split-export .s-main');
  var orig = btn.textContent;
  btn.textContent = '저장 중...'; btn.disabled = true;
  try {
    var el = document.getElementById('poster-canvas');
    /* A5 300dpi: 1748×2480px / 화면표시 559×794px → scale ≈ 3.126 */
    var canvas = await html2canvas(el, {
      scale: 3.126,
      useCORS: true,
      backgroundColor: '#f3f3f3',
      logging: false,
      width: 559,
      height: 794
    });
    var imgData = canvas.toDataURL('image/jpeg', 0.95);
    var { jsPDF } = window.jspdf;
    var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
    pdf.addImage(imgData, 'JPEG', 0, 0, 148, 210);
    pdf.save('르샤인_카드사별할부_' + new Date().toISOString().slice(0,10) + '.pdf');
  } catch(e) { alert('내보내기 중 오류가 발생했습니다.'); }
  btn.textContent = orig; btn.disabled = false;
}

/* ── 초기화 */
buildSidebar();
document.querySelectorAll('.tab-body textarea').forEach(autoResize);
renderPoster();
renderHistoryList();
// 이미지 로드 완료 후 재측정 (로고 이미지 높이 반영)
window.addEventListener('load', function() { fitCardList(); });
</script>
