<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>르샤인 진료일정 자동 생성기</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 상단 컨트롤 패널 ── */
  .panel {
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: relative;
    z-index: 10;
  }
  .panel h2 {
    font-size: 14px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-divider {
    width: 1px;
    height: 24px;
    background: #e8e8e8;
    flex-shrink: 0;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-group label {
    font-size: 12px;
    color: #777;
    white-space: nowrap;
  }
  select, input[type=number] {
    padding: 6px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: #fafafa;
    color: #222;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type=number]:focus { border-color: #225944; }
  input[type=text] {
    padding: 6px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    font-size: 12px;
    font-family: inherit;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: #225944; }

  .btn-add {
    padding: 6px 14px;
    background: #225944;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.18s;
  }
  .btn-add:hover { background: #1a4233; }

  /* 공휴일 태그 */
  .tag-area {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #eaf2ee;
    border: 1px solid #b8d5c5;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    color: #225944;
  }
  .tag button {
    background: none;
    border: none;
    cursor: pointer;
    color: #225944;
    font-size: 12px;
    line-height: 1;
    padding: 0;
  }

  /* ── 메인 레이아웃 (미리보기 + 사이드바) ── */
  .main-layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── 미리보기 영역 ── */
  .preview-wrap {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 24px;
    overflow: auto;
  }

  /* ── 우측 사이드바 ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: #fff;
    border-left: 1px solid #e8e8e8;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 20px 18px;
    border-bottom: 1px solid #f0f0f0;
  }
  .sidebar-section:last-child { border-bottom: none; }
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* 사이드바 내 업로드 버튼 */
  .upload-btn {
    position: relative;
    overflow: hidden;
    display: block;
    width: 100%;
    margin-bottom: 16px;
  }
  .upload-btn input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
  }
  .upload-btn button {
    width: 100%;
    padding: 9px 14px;
    background: #f7f7f7;
    border: 1.5px dashed #ddd;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    color: #555;
    text-align: center;
    transition: background 0.18s, border-color 0.18s;
  }
  .upload-btn button:hover { background: #f0f0f0; border-color: #bbb; }

  /* 슬라이더 그룹 */
  .slider-group {
    margin-bottom: 12px;
  }
  .slider-group label {
    display: block;
    font-size: 11px;
    color: #888;
    margin-bottom: 5px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-row input[type=range] {
    flex: 1;
    height: 4px;
    accent-color: #225944;
    cursor: pointer;
  }
  .slider-val {
    font-size: 11px;
    color: #999;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* 초기화 버튼 */
  .btn-reset {
    width: 100%;
    padding: 7px;
    background: #fafafa;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    color: #777;
    margin-top: 4px;
    transition: background 0.18s;
  }
  .btn-reset:hover { background: #f0f0f0; }

  /* 저장 버튼들 */
  .btn-save {
    width: 100%;
    padding: 11px;
    background: #225944;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.18s;
  }
  .btn-save:hover { background: #1a4233; }
  .btn-pdf {
    width: 100%;
    padding: 11px;
    background: #AE8D4A;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-pdf:hover { background: #8f7038; }

  .drag-hint {
    font-size: 10.5px;
    color: #bbb;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  /* 달력 카드 (595×842 = A4) */
  #calendar {
    width: 595px;
    height: 842px;
    position: relative;
    overflow: hidden;
    border-radius: 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    background: #87ceeb;
    flex-shrink: 0;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }

  #cal-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 50% 50%;
    transform-origin: center center;
    transform: scale(1);
    z-index: 0;
  }

  .ov-top {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 1;
  }
  .ov-bot {
    display: none;
  }

  .cal-inner {
    position: relative;
    z-index: 10;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 46px;
  }

  /* 로고 */
  .cal-logo {
    display: flex;
    align-items: center;
  }
  .cal-logo svg { width: 30px; height: 30px; }
  .logo-name {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .logo-sub {
    display: block;
    font-size: 8px;
    color: rgba(255,255,255,0.88);
    letter-spacing: 5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .cal-slogan {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.3px;
  }

  .cal-title {
    margin-top: 4px;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
  }

  /* 달력 카드 */
  .cal-card {
    margin-top: 12px;
    margin-bottom: 6px;
    width: 528px;
    background: rgba(255,255,255,0.96);
    border-radius: 10px;
    padding: 20px 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  .week-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid #ddd;
    padding-bottom: 6px;
    margin-bottom: 2px;
  }
  .wh {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #444;
    padding: 4px 0;
  }
  .wh.sun { color: #c0392b; }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .dc {
    text-align: center;
    padding: 10px 0 6px;
    font-size: 15px;
    font-weight: 500;
    color: #333;
    line-height: 1.2;
    min-height: 78px;
  }
  .dc.sun { color: #c0392b; }
  .dc .dn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 16px;
  }
  .dc.hol .dn {
    background: #c0392b;
    color: #fff;
    font-weight: 700;
  }
  .dc.sun.hol .dn {
    background: #c0392b;
    color: #fff;
  }
  .dc .hlabel {
    display: block;
    font-size: 13px;
    color: #c0392b;
    font-weight: 600;
    margin-top: 5px;
    line-height: 1.3;
  }
  .dc .hlabel .hujin {
    color: #000;
  }
  .dc.hol .hlabel { color: #c0392b; }

  .cal-msg {
    margin-top: 0;
    margin-bottom: 8px;
    padding: 6px 18px;
    font-size: 10.5px;
    color: #fff;
    font-weight: 500;
  }

  /* 진료시간 바 */
  .hours-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 20;
    padding: 0 24px;
  }
  .hi { text-align: center; }
  .hi .lb {
    display: block;
    font-size: 7.5px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 2px;
  }
  .hi .tm {
    display: block;
    font-size: 10px;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }
  .hdiv { width:1px; height:20px; background:rgba(255,255,255,0.28); }

  /* 인쇄 시 패널 숨김 */
  @media print {
    .panel, .sidebar { display: none; }
    .preview-wrap { padding: 0; background: none; }
    .main-layout { display: block; }
    body { background: none; }
    #calendar { box-shadow: none; }
  }
</style>
</head>

<!-- ── 상단 컨트롤 패널 ── -->
<div class="panel">
  <h2>🗓 르샤인 달력 생성기</h2>
  <div class="panel-divider"></div>

  <div class="ctrl-group">
    <label>연도</label>
    <input type="number" id="inp-year" value="2026" min="2024" max="2030" style="width:70px">
  </div>

  <div class="ctrl-group">
    <label>월</label>
    <select id="inp-month">
      <option value="1">1월</option><option value="2">2월</option>
      <option value="3" selected>3월</option><option value="4">4월</option>
      <option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option>
      <option value="9">9월</option><option value="10">10월</option>
      <option value="11">11월</option><option value="12">12월</option>
    </select>
  </div>

  <div class="panel-divider"></div>

  <div class="ctrl-group">
    <label>공휴일 추가</label>
    <input type="number" id="inp-hday" placeholder="일" min="1" max="31" style="width:52px">
    <input type="text" id="inp-hname" placeholder="공휴일명 (예: 삼일절)" style="width:150px">
    <button class="btn-add" onclick="addHoliday()">추가</button>
  </div>

  <div class="ctrl-group" style="flex-wrap:wrap;max-width:320px;">
    <label>등록된 공휴일</label>
    <div class="tag-area" id="tag-area"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  function getFileName() {
    const year = document.getElementById('inp-year').value;
    const month = document.getElementById('inp-month').value;
    return `르샤인_${year}년_${month}월_진료일정`;
  }

  function saveImage() {
    const el = document.getElementById('calendar');
    html2canvas(el, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
      const link = document.createElement('a');
      link.download = getFileName() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }

  function savePDF() {
    const el = document.getElementById('calendar');
    html2canvas(el, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
      const { jsPDF } = window.jspdf;
      // A5 사이즈 (148 x 210mm)
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
      const imgData = canvas.toDataURL('image/png');
      pdf.addImage(imgData, 'PNG', 0, 0, 148, 210);
      pdf.save(getFileName() + '.pdf');
    });
  }
  let holidays = { 1: '삼일절' };

  function renderCalendar() {
    const year = parseInt(document.getElementById('inp-year').value);
    const month = parseInt(document.getElementById('inp-month').value);

    document.getElementById('cal-title').textContent = month + '월 진료일정';

    const firstDay = new Date(year, month - 1, 1).getDay(); // 0=일
    const lastDate = new Date(year, month, 0).getDate();

    let html = '';
    // 빈 셀
    for (let i = 0; i < firstDay; i++) {
      html += '<div class="dc"></div>';
    }
    for (let d = 1; d <= lastDate; d++) {
      const dow = (firstDay + d - 1) % 7;
      const isSun = dow === 0;
      const isHol = holidays[d] !== undefined;
      let cls = 'dc';
      if (isSun) cls += ' sun';
      if (isHol) cls += ' hol';

      let label = '';
      if (isHol) {
        label = `<span class="hlabel">${holidays[d]}<br><span class="hujin">휴진</span></span>`;
      }
      html += `<div class="${cls}"><span class="dn">${d}</span>${label}</div>`;
    }
    // 나머지 빈 셀
    const total = firstDay + lastDate;
    const remainder = total % 7;
    if (remainder !== 0) {
      for (let i = 0; i < 7 - remainder; i++) {
        html += '<div class="dc"></div>';
      }
    }
    document.getElementById('day-grid').innerHTML = html;
  }

  function renderTags() {
    const area = document.getElementById('tag-area');
    area.innerHTML = '';
    Object.entries(holidays).sort((a,b)=>a[0]-b[0]).forEach(([day, name]) => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `${day}일 ${name} <button onclick="removeHoliday(${day})">×</button>`;
      area.appendChild(tag);
    });
  }

  function addHoliday() {
    const day = parseInt(document.getElementById('inp-hday').value);
    const name = document.getElementById('inp-hname').value.trim();
    if (!day || !name) { alert('날짜와 공휴일명을 모두 입력해주세요.'); return; }
    holidays[day] = name;
    document.getElementById('inp-hday').value = '';
    document.getElementById('inp-hname').value = '';
    renderTags();
    renderCalendar();
  }

  function removeHoliday(day) {
    delete holidays[day];
    renderTags();
    renderCalendar();
  }

  function updateBg() {
    const scale = document.getElementById('bg-scale').value;
    const x = document.getElementById('bg-x').value;
    const y = document.getElementById('bg-y').value;
    document.getElementById('bg-scale-val').textContent = scale + '%';
    document.getElementById('bg-x-val').textContent = x + '%';
    document.getElementById('bg-y-val').textContent = y + '%';
    const bg = document.getElementById('cal-bg');
    // object-position은 transform:scale()과 함께 쓰면 시각적으로 반영되지 않음
    // translate()로 이동을 처리: 0%=왼쪽, 50%=중앙, 100%=오른쪽
    const tx = (x - 50);
    const ty = (y - 50);
    bg.style.transform = `scale(${scale / 100}) translate(${tx}%, ${ty}%)`;
    bg.style.objectPosition = '50% 50%';
  }

  function resetBg() {
    document.getElementById('bg-scale').value = 100;
    document.getElementById('bg-x').value = 50;
    document.getElementById('bg-y').value = 50;
    updateBg();
  }

  function changeBg(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('cal-bg').src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // 년/월 변경 시 공휴일 초기화 후 재렌더
  document.getElementById('inp-year').addEventListener('change', () => {
    holidays = {};
    renderTags();
    renderCalendar();
  });
  document.getElementById('inp-month').addEventListener('change', () => {
    holidays = {};
    renderTags();
    renderCalendar();
  });

  // 초기 렌더
  renderTags();
  renderCalendar();

  // ── 배경 이미지 드래그 이동 기능 ──
  (function() {
    const cal = document.getElementById('calendar');
    let isDragging = false;
    let startX, startY;
    let startBgX, startBgY;

    function getBgValues() {
      return {
        x: parseFloat(document.getElementById('bg-x').value),
        y: parseFloat(document.getElementById('bg-y').value),
        scale: parseFloat(document.getElementById('bg-scale').value)
      };
    }

    cal.addEventListener('mousedown', function(e) {
      const scale = parseFloat(document.getElementById('bg-scale').value);
      if (scale <= 100) return; // 100% 이하면 드래그 비활성화

      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const v = getBgValues();
      startBgX = v.x;
      startBgY = v.y;
      cal.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      // 이동 감도: 칼렌더 크기(595px, 842px) 기준으로 % 변환
      // 드래그 방향 반전 (이미지가 손가락 따라 이동하는 느낌)
      const sensitivity = 0.05;
      let newX = startBgX - dx * sensitivity;
      let newY = startBgY - dy * sensitivity;

      newX = Math.max(0, Math.min(100, newX));
      newY = Math.max(0, Math.min(100, newY));

      document.getElementById('bg-x').value = newX;
      document.getElementById('bg-y').value = newY;
      updateBg();
    });

    document.addEventListener('mouseup', function() {
      if (!isDragging) return;
      isDragging = false;
      cal.style.cursor = '';
    });

    // 터치 지원 (모바일)
    cal.addEventListener('touchstart', function(e) {
      const scale = parseFloat(document.getElementById('bg-scale').value);
      if (scale <= 100) return;

      const touch = e.touches[0];
      isDragging = true;
      startX = touch.clientX;
      startY = touch.clientY;
      const v = getBgValues();
      startBgX = v.x;
      startBgY = v.y;
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      const touch = e.touches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;

      const sensitivity = 0.05;
      let newX = startBgX - dx * sensitivity;
      let newY = startBgY - dy * sensitivity;

      newX = Math.max(0, Math.min(100, newX));
      newY = Math.max(0, Math.min(100, newY));

      document.getElementById('bg-x').value = newX;
      document.getElementById('bg-y').value = newY;
      updateBg();
    });

    document.addEventListener('touchend', function() {
      isDragging = false;
    });

    // 확대 상태일 때 커서 힌트
    document.getElementById('bg-scale').addEventListener('input', function() {
      const scale = parseFloat(this.value);
      cal.style.cursor = scale > 100 ? 'grab' : '';
    });
  })();
</script>
</body>
</html>
