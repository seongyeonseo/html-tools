<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>르샤인 월별 이벤트 자동 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@font-face {
  font-family: 'GmarketSans';
  font-weight: 300;
  font-style: normal;
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansLight.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansLight.woff') format('woff');
}
@font-face {
  font-family: 'GmarketSans';
  font-weight: 500;
  font-style: normal;
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansMedium.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansMedium.woff') format('woff');
}
@font-face {
  font-family: 'GmarketSans';
  font-weight: 700;
  font-style: normal;
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansBold.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket@main/GmarketSansBold.woff') format('woff');
}

@font-face {
  font-family: 'New York';
  src: local('New York'), local('NewYork'), local('NewYork-Regular');
  font-weight: 100 900;
  font-style: normal;
}
@font-face {
  font-family: 'New York';
  src: local('New York Italic'), local('NewYork-Italic'), local('New York');
  font-weight: 100 900;
  font-style: italic;
}

:root {
  /* 미리보기 출력물 전용 (Le Shine 브랜드) */
  --gold:        #AE8D4A;
  --gold-lt:     #CCBB94;

  /* 생성기 UI (메디빌더 스타일) */
  --primary:     #1010FF;
  --primary-hov: #0a0acc;
  --ui-bg:       #f5f5f5;
  --ui-panel:    #ffffff;
  --ui-border:   #e4e4e4;
  --ui-border-2: #f0f0f0;
  --ui-hi:       #111111;
  --ui-md:       #888888;
  --ui-lo:       #bbbbbb;
  --ui-surface:  #fafafa;

  --sidebar-w:   260px;
  --topbar-h:    50px;
  --bar-h:       48px;
}

html { height: 100%; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: transparent;
  color: var(--ui-hi);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOP BAR ─────────────────────── */
#topbar {
  height: var(--topbar-h);
  background: var(--ui-panel);
  border-bottom: 1px solid var(--ui-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  min-width: 0;
}
.tb-brand {
  font-size: 13px;
  font-weight: 700;
  color: var(--ui-hi);
  letter-spacing: .3px;
  white-space: nowrap;
}
.tb-sep { color: #ddd; font-size: 12px; }
.tb-title {
  font-size: 12px;
  color: var(--ui-md);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tb-space { flex: 1; }
.tb-badge {
  font-size: 11px;
  color: var(--primary);
  background: rgba(16,16,255,.06);
  border: 1px solid rgba(16,16,255,.2);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .02em;
  white-space: nowrap;
}

/* ─── LAYOUT ──────────────────────── */
#layout {
  display: flex;
  flex: 1;
  width: 100%;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
}

/* ─── SIDEBAR (우측) ──────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: transparent;
  border-left: 1px solid var(--ui-border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  order: 2;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 2px; }

.sb-sec { padding: 20px 18px; border-bottom: 1px solid var(--ui-border-2); }
.sb-sec:last-child { border-bottom: none; }
.sb-lbl {
  font-size: 12px;
  font-weight: 700;
  color: #444;
  letter-spacing: .3px;
  margin-bottom: 14px;
}

.sz-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-radius: 6px;
  padding: 7px 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 1px;
  transition: background .12s;
  text-align: left;
}
.sz-btn:hover { background: #f0f0f0; }
.sz-btn.active { background: #ebebeb; }
.sz-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #e0e0e0;
  font-size: 10px;
  color: #888;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Pretendard', sans-serif;
}
.sz-btn.active .sz-num { background: #111; color: #fff; }
.sz-info { flex: 1; min-width: 0; }
.sz-name {
  font-size: 12px;
  color: #555;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'Pretendard', sans-serif;
}
.sz-btn.active .sz-name { color: #111; font-weight: 600; }
.sz-dim { font-size: 10px; color: #bbb; margin-top: 1px; }
.sz-tag {
  font-size: 10px;
  background: transparent;
  color: var(--primary);
  border: 1px solid rgba(16,16,255,.25);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'Pretendard', sans-serif;
}

/* bg thumb */
#bg-thumb {
  width: 100%; height: 68px;
  border-radius: 6px;
  background: var(--ui-surface);
  border: 1px dashed #d0d0d0;
  cursor: pointer;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin-bottom: 8px;
  transition: border-color .15s;
}
#bg-thumb:hover { border-color: var(--primary); }
#bg-thumb img { width: 100%; height: 100%; object-fit: cover; }
.bg-ph { font-size: 11px; color: #bbb; text-align: center; }
.bg-ph svg { display: block; margin: 0 auto 4px; }
#bg-file { display: none; }

.sb-input {
  width: 100%;
  background: var(--ui-surface);
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 12px;
  color: #111;
  outline: none;
  font-family: 'Pretendard', sans-serif;
  margin-bottom: 6px;
  transition: border-color .15s;
}
.sb-input:focus { border-color: var(--primary); }
.sb-input::placeholder { color: #bbb; }

.sb-btn {
  width: 100%;
  padding: 9px 10px;
  border-radius: 6px;
  border: 1px solid;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  transition: all .15s;
  margin-bottom: 5px;
  text-align: center;
}
.sb-btn.gold { background: #111; border-color: #111; color: #fff; }
.sb-btn.gold:hover { background: #333; border-color: #333; }
.sb-btn.outline { background: var(--ui-surface); border-color: #e0e0e0; color: #777; }
.sb-btn.outline:hover { background: #f0f0f0; border-color: #bbb; }

/* ─── PREVIEW ─────────────────────── */
#preview-area {
  flex: 1;
  min-width: 0;
  overflow: auto;
  padding: 32px 24px calc(var(--bar-h) + 32px);
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  order: 1;
}
#preview-area::-webkit-scrollbar { width: 5px; height: 5px; }
#preview-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

#preview-top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.pt-lbl { font-size: 11px; color: #bbb; letter-spacing: .06em; }
.pt-sz  { font-size: 11px; color: var(--primary); }

#canvas-wrapper {
  display: inline-block;
  position: relative;
  flex-shrink: 0;
}
#canvas-el {
  transform-origin: top left;
  display: block;
  position: relative;
  line-height: normal;
  font-size: 0;
  letter-spacing: -0.05em;
}
/* 인라인 편집 힌트 */
[data-edit] { cursor: text; border-radius: 2px; transition: background .15s; }
[data-edit]:hover { background: rgba(174,141,74,.12) !important; outline: 1px dashed rgba(174,141,74,.4); outline-offset: 3px; }
[data-edit]:focus { background: rgba(174,141,74,.08) !important; outline: 1px solid rgba(174,141,74,.65); outline-offset: 3px; }
[data-edit]:empty::before { content: attr(data-placeholder); opacity: .4; }

/* ─── EXPORT BAR ─────────────────── */
#export-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: var(--sidebar-w);
  height: var(--bar-h);
  background: var(--ui-panel);
  border-top: 1px solid var(--ui-border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 20px;
  gap: 10px;
  z-index: 20;
}
.eb-hint { font-size: 11px; color: #bbb; }
#export-btn {
  background: #111;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 9px 22px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background .15s;
}
#export-btn:hover { background: #333; }
#export-btn:disabled { opacity: .4; cursor: not-allowed; }


/* ─── ZOOM BAR ───────────────────── */
#zoom-bar {
  position: fixed;
  bottom: calc(var(--bar-h) + 12px);
  right: calc(var(--sidebar-w) + 16px);
  background: rgba(255,255,255,.96);
  border: 1px solid #e0e0e0;
  border-radius: 20px;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  gap: 2px;
  z-index: 200;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  user-select: none;
  pointer-events: all;
}
#zoom-bar button {
  background: none;
  border: none;
  color: #888;
  font-size: 15px;
  cursor: pointer;
  padding: 2px 9px;
  border-radius: 12px;
  line-height: 1;
  font-family: monospace;
  transition: all .12s;
}
#zoom-bar button:hover { background: #f0f0f0; color: #111; }
#zoom-pct {
  font-size: 11px;
  color: #888;
  min-width: 38px;
  text-align: center;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 6px;
}
#zoom-pct:hover { color: var(--primary); }
.zoom-sep { width: 1px; height: 14px; background: #e0e0e0; margin: 0 2px; }

/* ─── ITEM CONTROLS (editor only, stripped on export) ── */
.item-ctrl-bar { display:none; position:absolute; top:6px; right:0; align-items:center; gap:2px; background:rgba(255,255,255,.97); border:1px solid #E0E0E0; border-radius:20px; padding:3px 8px; box-shadow:0 2px 8px rgba(0,0,0,.1); z-index:10; }
.item-wrap:hover .item-ctrl-bar { display:flex; }
.type-dot { font-size:10px; color:#AAA; cursor:pointer; padding:2px 7px; border-radius:12px; font-family:'Pretendard',sans-serif; letter-spacing:-0.02em; user-select:none; }
.type-dot.active { color:#FFF; background:#AE8D4A; }
.type-sep { color:#DDD; font-size:9px; line-height:1; }
.ctrl-btn { background:none; border:none; cursor:pointer; font-size:13px; line-height:1; padding:0 2px; color:#CCC; margin-left:3px; }
.ctrl-btn:hover { color:#E55; }
.ctrl-add { display:block; width:100%; margin-top:8px; padding:7px 0; border:1px dashed #D4C9B4; background:transparent; color:#C4A96A; font-size:11px; letter-spacing:.06em; cursor:pointer; border-radius:4px; font-family:'Pretendard',sans-serif; }
.ctrl-add:hover { background:#FBF8F3; border-color:#AE8D4A; }
.ctrl-add-sec { display:block; width:100%; margin-top:20px; padding:10px 0; border:1px dashed #CCC; background:transparent; color:#AAA; font-size:11px; letter-spacing:.06em; cursor:pointer; border-radius:4px; font-family:'Pretendard',sans-serif; }
.ctrl-add-sec:hover { border-color:#AE8D4A; color:#AE8D4A; }
.ctrl-del-sec { font-size:10px; color:#CCC; background:none; border:none; cursor:pointer; margin-left:8px; }
.ctrl-del-sec:hover { color:#E55; }

/* ─── LOADING ────────────────────── */
#loading {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,.8); z-index: 100; backdrop-filter: blur(4px);
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading.show { display: flex; }
.ld-spin {
  width: 32px; height: 32px;
  border: 2px solid #e0e0e0; border-top-color: #111;
  border-radius: 50%; animation: spin .75s linear infinite;
}
.ld-msg { font-size: 12px; color: #888; font-family: 'Pretendard', sans-serif; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>


<div id="layout">
  <aside id="sidebar">

    <div class="sb-sec">
      <div class="sb-lbl">출력 사이즈</div>
      <div id="size-list"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">컨셉</div>
      <input class="sb-input" id="ci-sub"   placeholder="서브카피 (Wake up your…)">
      <input class="sb-input" id="ci-brand" placeholder="브랜드명 (Le Shine)">
      <input class="sb-input" id="ci-name"  placeholder="메인 타이틀 (Spring Glow)">
      <input class="sb-input" id="ci-theme" placeholder="테마 라벨 (theme1 : Skincare)">
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">배경 이미지</div>
      <div id="bg-thumb" onclick="document.getElementById('bg-file').click()">
        <div class="bg-ph">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          클릭하여 업로드
        </div>
      </div>
      <input type="file" id="bg-file" accept="image/*">
      <button class="sb-btn outline" id="bg-clear">배경 초기화</button>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">내보내기</div>
      <button class="sb-btn gold" id="export-sb">현재 사이즈 저장</button>
      <button class="sb-btn gold" id="export-all" style="margin-top:6px;">전체 세트 저장</button>
    </div>

  </aside>

  <main id="preview-area">
    <div id="canvas-wrapper">
      <div id="canvas-el"></div>
    </div>
  </main>

  <div id="zoom-bar">
    <button id="btn-zoom-out" title="축소">−</button>
    <span id="zoom-pct" title="클릭하면 맞춤">100%</span>
    <button id="btn-zoom-in" title="확대">+</button>
    <div class="zoom-sep"></div>
    <button id="btn-zoom-fit" style="font-size:12px;padding:2px 8px;">맞춤</button>
  </div>
</div>



<div id="loading">
  <div class="ld-spin"></div>
  <div class="ld-msg" id="ld-msg">PNG 생성 중...</div>
</div>


<script>
/* ═══════════════════════════════════════════
   SIZES
═══════════════════════════════════════════ */
const SIZES = [
  { id:'thumbnail',    name:'썸네일',      w:380,  h:320,  proc:false, sc:3 },
  { id:'landing',      name:'랜딩페이지',   w:1190, h:2173, proc:true,  sc:1 },
  { id:'popup-pc',     name:'팝업 PC',     w:800,  h:600,  proc:false, sc:3 },
  { id:'popup-mobile', name:'팝업 모바일', w:428,  h:540,  proc:false, sc:3 },
  { id:'a4-cover',     name:'A4 표지',     w:794,  h:1123, proc:false, sc:3 },
  { id:'a4-interior',  name:'A4 내지',     w:794,  h:1123, proc:true,  sc:3 },
  { id:'insta',        name:'인스타',      w:1080, h:1920, proc:false, sc:2 },
  { id:'tv',           name:'원내 TV',     w:3840, h:2160, proc:true,  sc:1 },
  { id:'desk',         name:'원내 데스크', w:3840, h:2160, proc:true,  sc:1 },
];

const DEFAULT = {
  concept: {
    brand_name: "Le Shine",
    name: "Spring Glow",
    sub_copy: "Wake up your deep energy, like a sprout",
    theme_label: "theme1 : Skincare",
    background_image: "",
    desk_rows: [
      { name: "시술명", prices: [{ count: "", value: "0만원" }] },
      { name: "시술명", prices: [{ count: "", value: "0만원" }] },
      { name: "시술명", prices: [{ count: "", value: "0만원" }] }
    ]
  },
  sections: [
    {
      section_name: "LE SHINE — Skin Booster",
      hashtags: [],
      items: [
        {
          name: "PRP 줄기세포",
          hashtags: ["#높은생착률","#피부재생","#잔주름개선"],
          prices: [
            { label:"1회", value:"25만원" },
            { label:"3회", value:"65만원" },
            { label:"5회", value:"99만원" }
          ],
          badges: [], type: "standard"
        },
        {
          name: "힐로 웨이브 2cc + 스킨 보톡스 (국산)",
          hashtags: ["#자연스러운볼륨","#속건조개선"],
          prices: [{ label:"", value:"75만원" }],
          badges: [], type: "standard"
        }
      ]
    },
    {
      section_name: "LE SHINE — 트리플 동안 마스터피스",
      hashtags: [],
      items: [
        {
          name: "울쎄라 300샷 + 써마지 600샷 + 온다 3만줄",
          hashtags: ["#가름한얼굴","#르샤인V라인"],
          prices: [{ label:"", value:"350만원" }],
          badges: ["이중턱 + PRP 줄기세포 1회 서비스"], type: "standard"
        }
      ]
    }
  ]
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const S = {
  idx: 0,
  data: clone(DEFAULT),
  bgUrl: '',
  bgTone: '8,12,10',
  bgLightColor: '#FAFAFD',
  bgAccentDark: '#143428',
};
function clone(o) { return JSON.parse(JSON.stringify(o)); }

/* ═══════════════════════════════════════════
   LOCAL STORAGE — 뒤로가기 후에도 내용 유지
═══════════════════════════════════════════ */
const LS_KEY = 'leshine_eg_v1';

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      data:         S.data,
      idx:          S.idx,
      bgTone:       S.bgTone,
      bgLightColor: S.bgLightColor,
      bgAccentDark: S.bgAccentDark,
      bgAccentLight:S.bgAccentLight,
    }));
  } catch(e) {}
  // 배경 이미지는 별도 키 (용량 큼 — 실패해도 무시)
  try {
    if (S.bgUrl) localStorage.setItem(LS_KEY + '_bg', S.bgUrl);
    else         localStorage.removeItem(LS_KEY + '_bg');
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.data)         S.data         = p.data;
    if (p.idx != null)  S.idx          = p.idx;
    if (p.bgTone)       S.bgTone       = p.bgTone;
    if (p.bgLightColor) S.bgLightColor = p.bgLightColor;
    if (p.bgAccentDark) S.bgAccentDark = p.bgAccentDark;
    if (p.bgAccentLight)S.bgAccentLight= p.bgAccentLight;
  } catch(e) {}
  try {
    const bg = localStorage.getItem(LS_KEY + '_bg');
    if (bg) S.bgUrl = bg;
  } catch(e) {}
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function init() {
  loadState();                  // ← 저장된 상태 먼저 복원
  buildList();
  setupConceptInputs();
  setupBg();
  setupExport();
  if (S.bgUrl) showThumb(S.bgUrl);  // ← 배경 이미지 썸네일 복원
  window.addEventListener('resize', applyScale);
  document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
  document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
  document.getElementById('btn-zoom-fit').addEventListener('click', zoomFit);
  document.getElementById('zoom-pct').addEventListener('click', zoomFit);
  document.getElementById('preview-area').addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (e.deltaY < 0) zoomIn(); else zoomOut();
    }
  }, { passive: false });
  selectSize(S.idx);            // ← 마지막으로 보던 탭 복원
}

/* ─── CONCEPT INPUTS ──────────── */
function setupConceptInputs() {
  const fields = [
    { id: 'ci-sub',   key: 'sub_copy'    },
    { id: 'ci-brand', key: 'brand_name'  },
    { id: 'ci-name',  key: 'name'        },
    { id: 'ci-theme', key: 'theme_label' },
  ];
  fields.forEach(({ id, key }) => {
    const el = document.getElementById(id);
    el.value = S.data.concept[key] || '';
    el.addEventListener('input', () => {
      S.data.concept[key] = el.value;
      render();
    });
  });
}

/* ─── SIZE LIST ────────────────── */
function buildList() {
  const el = document.getElementById('size-list');
  SIZES.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'sz-btn' + (i===0?' active':'');
    b.innerHTML = `
      <div class="sz-num">${i+1}</div>
      <div class="sz-info">
        <div class="sz-name">${s.name}</div>
        <div class="sz-dim">${s.w} × ${s.h}px</div>
      </div>
      ${s.proc?'<span class="sz-tag">시술</span>':''}`;
    b.onclick = () => selectSize(i);
    el.appendChild(b);
  });
}

function selectSize(i) {
  S.idx = i;
  previewZoom = 1;
  document.querySelectorAll('.sz-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  render(); // render() 안에서 saveState() 호출됨
}

/* ─── RENDER ───────────────────── */
function render() {
  const s  = SIZES[S.idx];
  const el = document.getElementById('canvas-el');

  if (s.id === 'a4-interior') {
    const pages = tA4Int(S.data, S.bgUrl);
    el.style.width  = s.w + 'px';
    el.style.height = (s.h * pages.length + 16*(pages.length-1)) + 'px';
    el.style.fontSize = '0';
    el.innerHTML = pages.map((html,pi)=>
      `<div style="display:block;${pi>0?'margin-top:16px;':''}width:${s.w}px;height:${s.h}px;overflow:hidden;position:relative;">${html}</div>`
    ).join('');
  } else {
    el.style.width  = s.w + 'px';
    el.style.height = (s.id === 'landing') ? 'auto' : s.h + 'px';
    el.style.fontSize = '0';
    el.innerHTML = route(s.id, S.data, S.bgUrl);
  }
  applyScale();
  if (s.id === 'landing') requestAnimationFrame(applyScale);
  attachEditors();
  saveState();
}

let previewZoom = 1;
function zoomIn()  { previewZoom = Math.min(previewZoom * 1.25, 8); applyScale(); }
function zoomOut() { previewZoom = Math.max(previewZoom / 1.25, 0.08); applyScale(); }
function zoomFit() { previewZoom = 1; applyScale(); }

function applyScale() {
  const s   = SIZES[S.idx];
  const area = document.getElementById('preview-area');
  const el   = document.getElementById('canvas-el');
  const wrap = document.getElementById('canvas-wrapper');
  const aw = area.clientWidth  - 40;
  const ah = area.clientHeight - 60;
  const W  = parseInt(el.style.width)  || s.w;
  const H  = el.style.height === 'auto' ? el.scrollHeight : (parseInt(el.style.height) || s.h);
  const fitSc = Math.min(aw/W, ah/H);
  const sc    = fitSc * previewZoom;
  el.style.transform       = `scale(${sc})`;
  el.style.transformOrigin = 'top left';
  wrap.style.width   = Math.round(W*sc) + 'px';
  wrap.style.height  = Math.round(H*sc) + 'px';
  wrap.style.overflow = previewZoom > 1.05 ? 'visible' : 'hidden';
  const lbl = document.getElementById('zoom-pct');
  if (lbl) lbl.textContent = Math.round(sc * 100) + '%';
}

/* Gradient overlay helpers */
function ovBottom(opacity=.78) {
  return `<div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 0%,rgba(15,20,15,${opacity}) 100%);"></div>`;
}
function ovLeft(opacity=.55) {
  return `<div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(15,20,15,${opacity}) 0%,transparent 65%);"></div>`;
}
function ovFull(opacity=.45) {
  return `<div style="position:absolute;inset:0;background:rgba(15,20,15,${opacity});"></div>`;
}
function ovRadial(cx='50%', cy='55%', opacity=.44) {
  const t = (typeof S !== 'undefined' && S.bgTone) ? S.bgTone : '8,12,10';
  const op2 = Math.round(opacity * .28 * 100) / 100;
  return `<div style="position:absolute;inset:0;background:radial-gradient(ellipse 72% 62% at ${cx} ${cy},rgba(${t},${opacity}) 0%,rgba(${t},${op2}) 55%,transparent 100%);pointer-events:none;"></div>`;
}
function ovGreen() {
  return `<div style="position:absolute;inset:0;background:linear-gradient(145deg,#143428 0%,#0a1f15 60%,#1c3a22 100%);"></div>`;
}

/* Gold thin line */
function hLine(color='rgba(174,141,74,.5)') {
  return `<div style="height:1px;background:${color};"></div>`;
}

/* Split price value into number and unit (e.g. "25만원~" → ["25","만원~"]) */
function splitPriceVal(val) {
  const m = String(val).match(/^(\d[\d,.]*)([\s\S]*)$/);
  return m ? [m[1], m[2]] : [val, ''];
}

/* Hashtag row */
function tags(arr, fz='11px', color='rgba(174,141,74,.75)') {
  return arr.map(t=>`<span style="font-size:${fz};color:${color};margin-right:7px;font-family:'Pretendard','Jost',sans-serif;">${t}</span>`).join('');
}

/* Badge */
function bdg(txt) {
  if (!txt) return '';
  return `<div style="display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(174,141,74,.35);border-radius:3px;padding:3px 10px;font-size:.85em;color:#AE8D4A;margin-top:5px;font-family:'Pretendard','Jost',sans-serif;">🎁 ${txt}</div>`;
}

/* Price chips */
function prices(arr, fz='18px', lFz='11px') {
  return arr.map(p=>
    `<span style="display:inline-flex;align-items:baseline;gap:3px;margin-left:10px;">
      ${p.label?`<span style="font-size:${lFz};color:#888;font-family:'Pretendard','Jost',sans-serif;">${p.label}</span>`:''}
      <span style="font-family:'New York','Cormorant Garamond',serif;font-size:${fz};color:#AE8D4A;font-weight:600;">${p.value}</span>
    </span>`
  ).join('');
}

/* Light-BG price row (for white panels) */
function priceRowLight(item, nameFz='14px', priceFz='18px', lineColor='#EBEBEB') {
  return `
  <div style="padding:11px 0;border-bottom:1px solid ${lineColor};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
      <div style="flex:1;">
        <div style="font-family:'Pretendard',sans-serif;font-size:${nameFz};color:#1A1A1A;line-height:1.4;">${item.name}</div>
        <div style="margin-top:3px;">${item.hashtags.map(t=>`<span style="font-size:.7em;color:#999;margin-right:5px;">${t}</span>`).join('')}</div>
        ${(item.badges||[]).map(b=>`<div style="display:inline-block;background:#f5f5f0;border:1px solid #ddd;border-radius:3px;padding:2px 8px;font-size:.72em;color:#888;margin-top:4px;margin-right:4px;">🎁 ${b}</div>`).join('')}
      </div>

        ${item.prices.map(p=>`
          <div style="display:flex;align-items:baseline;gap:3px;justify-content:flex-end;margin-bottom:2px;">

            <span style="font-family:'New York','Cormorant Garamond',serif;font-size:${priceFz};color:#AE8D4A;font-weight:600;">${p.value}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

/* Dark-BG price row (for image overlays) */
function priceRowDark(item, nameFz='15px', priceFz='20px', lineColor='rgba(255,255,255,.1)') {
  return `
  <div style="padding:12px 0;border-bottom:1px solid ${lineColor};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
      <div style="flex:1;">
        <div style="font-family:'Pretendard',sans-serif;font-size:${nameFz};color:#FFFFFF;line-height:1.4;">${item.name}</div>
        <div style="margin-top:3px;">${tags(item.hashtags,'10px','rgba(174,141,74,.7)')}</div>

      </div>
      <div style="flex-shrink:0;text-align:right;">
        ${item.prices.map(p=>`
          <div style="display:flex;align-items:baseline;gap:3px;justify-content:flex-end;margin-bottom:2px;">
            ${p.label?`<span style="font-size:.7em;color:rgba(255,255,255,.5);font-family:'Pretendard','Jost',sans-serif;">${p.label}</span>`:''}
            <span style="font-family:'New York','Cormorant Garamond',serif;font-size:${priceFz};color:#AE8D4A;font-weight:600;">${p.value}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

/* ─── TEMPLATE ROUTER ──────────── */
function route(id, data, bg) {
  return ({
    'thumbnail':    tThumb,
    'landing':      tLanding,
    'popup-pc':     tPopupPC,
    'popup-mobile': tPopupMob,
    'a4-cover':     tA4Cov,
    'insta':        tInsta,
    'tv':           tTV,
    'desk':         tDesk,
  }[id] || tThumb)(data, bg);
}

/* ═══════════════════════════════════════════
   1. THUMBNAIL  380 × 320
   레이아웃 (중앙정렬): sub_copy → 메인타이틀 → theme_label
═══════════════════════════════════════════ */
function tThumb(data, bgUrl) {
  const { concept } = data;
  const bn = concept.brand_name || 'Le Shine';
  return `
<div style="width:380px;height:320px;position:relative;overflow:hidden;font-family:'Pretendard','Jost',sans-serif;${bgCSS(bgUrl,'#1a2e20')}">
  ${bgUrl ? ovRadial('50%','50%',.48) : ovGreen()}

  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px 32px;">
    <!-- sub_copy -->
    <div style="font-size:9.5px;color:#FFFFFF;letter-spacing:-0.03em;line-height:1.55;font-weight:300;margin-bottom:14px;">${concept.sub_copy}</div>
    <!-- main title: brand_name + concept.name (2줄, 동일 폰트/스케일) -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:14px;">
      <div style="font-family:'New York','Cormorant Garamond',serif;font-style:normal;font-size:30px;color:#FFFFFF;line-height:1.05;font-weight:300;">${bn}</div>
      <div style="font-family:'New York','Cormorant Garamond',serif;font-style:normal;font-size:30px;color:#FFFFFF;line-height:1.05;font-weight:300;">${concept.name}</div>

/* ═══════════════════════════════════════════
   LANDING ITEM RENDERER  (standard / simple)
═══════════════════════════════════════════ */
function lItemHtml(item, si, ii, accent) {
  const type = (item.type === 'featured') ? 'standard' : (item.type || 'standard');
  const ac = accent || '#AE8D4A';
  const MAX_PRICES = 6;
  // 4개 이상이면 가격을 다음 행(아래)으로 내림
  const priceBelow = item.prices.length >= 4;

  // Price items: label (accent + white, ×로 횟수만 삭제 가능) + 숫자(editable) + 단위(고정)
  const priceItems = item.prices.map((p, pi) => {
    const [num, unit] = splitPriceVal(p.value);
    return `
    <span style="display:inline-flex;align-items:flex-end;gap:4px;flex-shrink:0;">
      <span ${!p.label ? 'data-ctrl' : ''} style="position:relative;display:inline-flex;">
        <span data-edit="sections.${si}.items.${ii}.prices.${pi}.label"
              data-placeholder="횟수"
              style="background:${p.label?ac:'transparent'};color:${p.label?'#FFFFFF':'#C0B8A8'};font-size:16px;padding:6px 10px;border-radius:4px;border:${p.label?'none':'1px dashed #D0C8B8'};font-family:'Pretendard',sans-serif;font-weight:300;letter-spacing:-0.04em;margin-bottom:6px;min-width:28px;text-align:center;display:inline-flex;align-items:center;justify-content:center;line-height:1;">${p.label}</span>
        ${p.label ? `<button data-ctrl onclick="clearPriceLabel(${si},${ii},${pi})" title="횟수 삭제" style="position:absolute;top:-5px;right:-5px;background:#D55;color:#FFF;border:none;border-radius:50%;width:14px;height:14px;cursor:pointer;font-size:8px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;">×</button>` : ''}
      </span>
      <span style="display:inline-flex;align-items:baseline;gap:1px;line-height:1;">
        <span data-edit="sections.${si}.items.${ii}.prices.${pi}.value"
              data-save-suffix="${unit}"
              data-placeholder="0"
              style="font-family:'GmarketSans','Pretendard',sans-serif;font-size:52px;font-weight:500;color:#212121;letter-spacing:-0.04em;">${num}</span><span style="font-family:'Pretendard',sans-serif;font-size:30px;font-weight:300;color:#212121;letter-spacing:-0.04em;">${unit}</span>
      </span>
      <button data-ctrl onclick="removePrice(${si},${ii},${pi})" title="가격 삭제" style="background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0 0 0 1px;line-height:1;margin-bottom:6px;">×</button>
    </span>`;
  }).join('');

  const addBtn = item.prices.length < MAX_PRICES
    ? `<button data-ctrl onclick="addPrice(${si},${ii})" style="background:none;border:1px dashed #D0C8B8;border-radius:20px;padding:3px 11px;font-size:11px;color:#B0A898;cursor:pointer;font-family:'Pretendard',sans-serif;letter-spacing:-0.04em;align-self:center;">+ 가격</button>`
    : '';

  const priceRow = `
    <div style="display:flex;flex-direction:row;flex-wrap:wrap;gap:4px 12px;align-items:flex-end;">
      ${priceItems}${addBtn}
    </div>`;

  // Hashtags with add/delete
  const tagList = (item.hashtags || []).map((t, ti) =>
    `<span style="display:inline-flex;align-items:center;gap:2px;margin-right:5px;">
      <span data-edit="sections.${si}.items.${ii}.hashtags.${ti}" data-placeholder="#태그" style="font-family:'Pretendard',sans-serif;font-size:22px;color:${ac};opacity:.7;letter-spacing:-0.04em;">${t}</span>
      <button data-ctrl onclick="removeItemHashtag(${si},${ii},${ti})" style="background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0;line-height:1;">×</button>
    </span>`).join('');

  const tagRow = `
    <div style="display:flex;flex-wrap:wrap;align-items:center;margin-top:5px;">
      ${tagList}
      <button data-ctrl onclick="addItemHashtag(${si},${ii})" style="background:none;border:1px dashed #D0C8B8;border-radius:20px;padding:2px 10px;font-size:10px;color:#B0A898;cursor:pointer;font-family:'Pretendard',sans-serif;letter-spacing:-0.04em;">+ 태그</button>
    </div>`;

  const ctrlBar = `
    <div class="item-ctrl-bar" data-ctrl>
      <span class="type-dot${type==='standard'?' active':''}" onclick="setItemType(${si},${ii},'standard')">기본</span>
      <span class="type-sep">|</span>
      <span class="type-dot${type==='simple'?' active':''}" onclick="setItemType(${si},${ii},'simple')">심플</span>
      <button class="ctrl-btn" onclick="removeItem(${si},${ii})" title="삭제">×</button>
    </div>`;

  const nameStyle = `font-family:'Pretendard',sans-serif;font-size:30px;font-weight:500;letter-spacing:-0.04em;`;

  // Badge chips (포인트) - 해시태그와 동일 22px
  const badgeChips = (item.badges || []).map((b, bi) =>
    `<span style="display:inline-flex;align-items:center;gap:2px;margin-right:6px;margin-top:5px;">
      <span data-edit="sections.${si}.items.${ii}.badges.${bi}" data-placeholder="포인트 워딩" style="display:inline-block;background:#f5f5f0;border:1px solid #ddd;border-radius:3px;padding:3px 10px;font-size:22px;color:#888;letter-spacing:-0.04em;">🎁 ${b}</span>
      <button data-ctrl onclick="removeBadge(${si},${ii},${bi})" style="background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0;line-height:1;">×</button>

    </div>`;

  // Option chips
  const optionChips = (item.options || []).map((o, oi) =>
    `<span style="display:inline-flex;align-items:center;gap:6px;margin-right:8px;margin-top:5px;">
      <span style="display:inline-block;background:#EEF4F2;border:1.5px solid ${ac};border-radius:3px;padding:3px 10px;font-size:22px;color:${ac};font-weight:600;letter-spacing:-0.04em;flex-shrink:0;">옵션</span>
      <span data-edit="sections.${si}.items.${ii}.options.${oi}" data-placeholder="옵션 내용" style="font-family:'Pretendard',sans-serif;font-size:22px;color:#1A1A1A;letter-spacing:-0.04em;">${o}</span>
      <button data-ctrl onclick="removeOption(${si},${ii},${oi})" style="background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0;line-height:1;">×</button>
    </span>`).join('');
  const optionRow = (item.options || []).length ? `
    <div style="display:flex;flex-wrap:wrap;align-items:center;margin-top:10px;">
      ${optionChips}
    </div>` : '';

  if (type === 'simple') {
    return `
      <div class="item-wrap" style="padding:18px 0;position:relative;">
        ${priceBelow ? `
          <div data-edit="sections.${si}.items.${ii}.name" data-placeholder="시술명" style="${nameStyle}color:#2A2A2A;">${item.name}</div>
          <div style="display:flex;justify-content:flex-end;margin-top:8px;">${priceRow}</div>

            <div style="flex:0 0 auto;margin-left:auto;">${priceRow}</div>
          </div>
        `}

      </div>`;
  }

  // standard
  return `
    <div class="item-wrap" style="padding:20px 0;position:relative;">
      ${priceBelow ? `
        <div>
          <div data-edit="sections.${si}.items.${ii}.name" data-placeholder="시술명" style="${nameStyle}color:#1A1A1A;">${item.name}</div>

        <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px 20px;">
          <div style="flex:1 1 300px;min-width:0;">
            <div data-edit="sections.${si}.items.${ii}.name" data-placeholder="시술명" style="${nameStyle}color:#1A1A1A;">${item.name}</div>
            ${tagRow}

            ${optionRow}
          </div>
          <div style="flex:0 0 auto;margin-left:auto;">${priceRow}</div>
        </div>
      `}
      ${ctrlBar}
    </div>`;
}

/* ═══════════════════════════════════════════
   6. A4 INTERIOR  794 × 1123 × N pages
═══════════════════════════════════════════ */
function tA4Int(data, bgUrl) {
  const { concept, sections } = data;
  const MAX = 8;
  const pages = [];
  let cur = [], cnt = 0;

  sections.forEach((sec, si) => {
    const n = sec.items.length;
    if (cnt > 0 && cnt + n > MAX) { pages.push(cur); cur = []; cnt = 0; }
    if (cnt === 0 && n > MAX) {
      for (let i=0; i<sec.items.length; i+=MAX) {
        const chunk = sec.items.slice(i, i+MAX).map((item, ci) => ({...item, _ii: i+ci}));
        if (cur.length) { pages.push(cur); cur = []; cnt = 0; }
        cur.push({...sec, items: chunk, _si: si});
        if (i+MAX < sec.items.length) { pages.push(cur); cur = []; cnt = 0; }
        else cnt = chunk.length;
      }
    } else { cur.push({...sec, items: sec.items.map((item, ii) => ({...item, _ii: ii})), _si: si}); cnt += n; }
  });
  if (cur.length) pages.push(cur);
  if (!pages.length) pages.push([]);

  const hasBg = !!bgUrl;
  const accent    = hasBg ? (S.bgAccentLight || '#CCBB94') : (S.bgAccentDark || '#143428');
  const nameClr   = hasBg ? '#FFFFFF'               : '#1A1A1A';
  const priceClr  = hasBg ? '#FFFFFF'               : (S.bgAccentDark || '#143428');
  const secClr    = hasBg ? (S.bgAccentLight || '#CCBB94') : (S.bgAccentDark || '#143428');
  const lineClr   = hasBg ? 'rgba(255,255,255,.12)' : '#EBEBEB';
  const thmClr    = hasBg ? '#FFFFFF'               : (S.bgAccentDark || '#143428');
  const thmBdr    = hasBg ? 'rgba(255,255,255,.6)'  : (S.bgAccentDark || '#143428');
  const bdgBg     = hasBg ? 'rgba(174,141,74,.12)'  : '#f5f5f0';
  const bdgBdr    = hasBg ? 'rgba(174,141,74,.35)'  : '#ddd';
  const bdgClr    = hasBg ? '#CCBB94'               : '#888';
  return pages.map((secs, pi) => `
<div style="width:794px;height:1123px;font-family:'Pretendard','Jost',sans-serif;position:relative;display:flex;flex-direction:column;overflow:hidden;${hasBg ? `background-image:url('${bgUrl}');background-size:cover;background-position:center;` : `background:${S.bgLightColor||'#FAFAFD'};`}">
  ${hasBg ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,.6);pointer-events:none;"></div>` : ''}

  <div style="position:relative;flex:1;overflow:hidden;padding:56px 52px ${pi === pages.length - 1 ? '48px' : '28px'};">
    ${pi === pages.length - 1 ? `<div style="position:absolute;bottom:18px;right:52px;font-size:11px;color:rgba(255,255,255,.5);font-family:'Pretendard',sans-serif;letter-spacing:.04em;">VAT 별도</div>` : ''}
    ${pi === 0 ? `
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-family:'New York','Cormorant Garamond',serif;font-size:13px;font-weight:300;letter-spacing:-0.04em;color:${thmClr};border:1.5px solid ${thmBdr};border-radius:50%;padding:12px 28px;display:inline-flex;align-items:center;justify-content:center;line-height:1;">${concept.theme_label}</div>
    </div>` : ''}

    ${secs.map(sec=>{
      const hasHeader = (sec.section_name||'').trim() !== '';
      const secTags = sec.hashtags || [];
      return `
      <div style="margin-bottom:24px;">
        <div style="height:1px;background:${lineClr};margin-bottom:12px;"></div>
        ${hasHeader ? `
        <div style="margin-bottom:${secTags.length ? '7px' : '11px'};">
          <span style="font-family:'Pretendard',sans-serif;font-size:23px;color:${secClr};letter-spacing:-0.04em;font-weight:600;line-height:1.2;">${sec.section_name}</span>
        </div>
        ${secTags.length ? `<div style="margin-bottom:11px;">${secTags.map(t=>`<span style="font-size:15px;color:${accent};opacity:.65;margin-right:5px;letter-spacing:-0.04em;">${t}</span>`).join('')}</div>` : ''}
        ` : ''}
        ${sec.items.map(item=>{
          const priceBelow = item.prices.length >= 4;
          const nameHtml = `<div style="font-family:'Pretendard',sans-serif;font-size:20px;font-weight:500;color:${nameClr};letter-spacing:-0.04em;line-height:1.3;">${item.name}</div>`;
          const tagsHtml = item.hashtags.length ? `<div style="margin-top:3px;">${item.hashtags.map(t=>`<span style="font-size:15px;color:${accent};opacity:.7;margin-right:5px;letter-spacing:-0.04em;">${t}</span>`).join('')}</div>` : '';
          const badgesHtml  = (item.badges||[]).length  ? `<div style="margin-top:10px;">${(item.badges||[]).map(b=>`<span style="display:inline-block;background:${bdgBg};border:1px solid ${bdgBdr};border-radius:3px;padding:2px 8px;font-size:13px;color:${bdgClr};margin-right:4px;">🎁 ${b}</span>`).join('')}</div>` : '';
          const optionsHtml = (item.options||[]).length ? `<div style="margin-top:10px;">${(item.options||[]).map(o=>`<span style="display:inline-flex;align-items:center;gap:5px;margin-right:8px;"><span style="display:inline-block;background:rgba(255,255,255,.12);border:1px solid ${accent};border-radius:3px;padding:2px 8px;font-size:13px;color:${accent};font-weight:700;flex-shrink:0;">옵션</span><span style="font-size:13px;color:${nameClr};letter-spacing:-0.03em;">${o}</span></span>`).join('')}</div>` : '';
          const pricesHtml = `<div style="display:flex;flex-direction:row;flex-wrap:wrap;gap:3px 8px;align-items:flex-end;${priceBelow ? 'justify-content:flex-end;' : ''}">
            ${item.prices.map(p=>{
              const [n,u] = splitPriceVal(p.value);
              return `<span style="display:inline-flex;align-items:flex-end;gap:3px;flex-shrink:0;">
                ${p.label ? `<span style="background:${accent};color:#FFF;font-size:11px;padding:5px 7px;border-radius:3px;font-family:'Pretendard',sans-serif;font-weight:300;margin-bottom:5px;display:inline-flex;align-items:center;justify-content:center;line-height:1;">${p.label}</span>` : ''}
                <span style="display:inline-flex;align-items:baseline;gap:1px;line-height:1;">
                  <span style="font-family:'GmarketSans','Pretendard',sans-serif;font-size:35px;font-weight:500;color:${priceClr};letter-spacing:-0.04em;">${n}</span><span style="font-family:'Pretendard',sans-serif;font-size:20px;font-weight:300;color:${priceClr};letter-spacing:-0.04em;">${u}</span>
                </span>
              </span>`;
            }).join('')}
          </div>`;
          return `
          <div style="padding:14px 0;position:relative;">
            ${priceBelow ? `
              <div>${nameHtml}${tagsHtml}${badgesHtml}${optionsHtml}</div>
              <div style="margin-top:8px;">${pricesHtml}</div>
            ` : `
              <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px 20px;">
                <div style="flex:1 1 200px;min-width:0;">${nameHtml}${tagsHtml}${badgesHtml}${optionsHtml}</div>
                <div style="flex:0 0 auto;margin-left:auto;">${pricesHtml}</div>
              </div>
            `}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>
</div>`);
}

/* ═══════════════════════════════════════════
   8. 원내 TV  3840 × 2160
   ── 좌측 브랜딩(썸네일 스타일) + 우측 가격 패널
═══════════════════════════════════════════ */
function tTV(data, bgUrl) {
  const { concept } = data;
  const bn = concept.brand_name || 'Le Shine';
  const rows = concept.desk_rows || [];

  const cols     = rows.length <= 2 ? 1 : rows.length <= 6 ? 2 : 3;
  const panelW   = cols === 1 ? 1230 : cols === 2 ? 2280 : 3240;
  const chunkSize = Math.ceil(rows.length / cols);
  const chunks = [];
  for (let i = 0; i < Math.max(rows.length, 1); i += chunkSize) {
    chunks.push(rows.slice(i, i + chunkSize).map((r, j) => ({ ...r, _i: i + j })));
  }

  return `
<div style="width:3840px;height:2160px;position:relative;overflow:hidden;font-family:'Pretendard','Jost',sans-serif;${bgCSS(bgUrl,'#1a2e20')}">
  ${bgUrl ? ovRadial('30%','45%',.5) : ovGreen()}

  <!-- ── LEFT area, text center-aligned ── -->
  <div style="position:absolute;top:0;left:0;width:2200px;bottom:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 200px;">
    <div style="font-size:75px;color:#FFFFFF;letter-spacing:-0.03em;line-height:1.6;font-weight:300;margin-bottom:42px;">${concept.sub_copy}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-size:195px;color:#FFFFFF;line-height:1.0;font-weight:300;">${bn}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-size:195px;color:#FFFFFF;line-height:1.0;font-weight:300;">${concept.name}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-weight:300;font-size:52px;letter-spacing:-0.03em;color:#FFFFFF;border:2px solid rgba(255,255,255,.55);border-radius:50%;padding:44px 105px;display:inline-flex;align-items:center;justify-content:center;line-height:1;margin-top:60px;">${concept.theme_label}</div>
  </div>

  <!-- ── Bottom-right: price panel ── -->
  <div style="position:absolute;bottom:120px;right:200px;z-index:2;width:${panelW}px;background:rgba(250,250,253,.88);">
    <div style="padding:54px 96px 60px;display:flex;gap:96px;">
      ${chunks.map(chunk => `
      <div style="flex:1;">
        ${chunk.map(row => {
          const rowPrices = row.prices || [{ count: row.count||'', value: row.price||'0만원' }];
          return `
        <div style="padding:28px 0;">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:36px;">
            <div data-edit="concept.desk_rows.${row._i}.name" data-placeholder="시술명" style="font-family:'Pretendard',sans-serif;font-size:51pt;font-weight:600;color:#1A1A1A;letter-spacing:-0.04em;line-height:1.2;flex:1;min-width:0;">${row.name}</div>
            <div style="display:flex;flex-direction:row;flex-wrap:wrap;align-items:flex-end;justify-content:flex-end;gap:8px 20px;flex-shrink:0;">
              ${rowPrices.map((p, pi) => {
                const [num, unit] = splitPriceVal(p.value);
                return `
              <div style="display:flex;align-items:baseline;gap:16px;">
                ${p.count ? `<div data-edit="concept.desk_rows.${row._i}.prices.${pi}.count" style="font-family:'Pretendard',sans-serif;font-size:33pt;font-weight:300;color:#888;letter-spacing:-0.02em;line-height:1;">${p.count}</div>` : `<span data-ctrl><div data-edit="concept.desk_rows.${row._i}.prices.${pi}.count" data-placeholder="횟수" style="font-family:'Pretendard',sans-serif;font-size:16px;color:#C0B8A8;border:1px dashed #D0C8B8;border-radius:4px;padding:3px 10px;cursor:text;min-width:40px;"></div></span>`}
                <div data-edit="concept.desk_rows.${row._i}.prices.${pi}.value" data-rerender data-placeholder="0만원" style="display:inline-flex;align-items:baseline;gap:3px;font-family:'GmarketSans','Pretendard',sans-serif;color:#143428;letter-spacing:-0.04em;"><span style="font-size:51pt;font-weight:500;line-height:1;">${num}</span><span style="font-size:26pt;font-weight:300;line-height:1;">${unit}</span></div>
                <button data-ctrl onclick="removeDeskPrice(${row._i},${pi})" style="background:none;border:none;cursor:pointer;font-size:22px;color:#CCC;padding:0;line-height:1;">×</button>
              </div>`;
              }).join('')}
              <button data-ctrl onclick="addDeskPrice(${row._i})" style="background:none;border:1px dashed #C0B8A8;border-radius:20px;padding:4px 16px;font-size:14px;color:#A0988A;cursor:pointer;font-family:'Pretendard',sans-serif;align-self:center;">+ 가격</button>
            </div>
            <button data-ctrl onclick="removeDeskRow(${row._i})" style="background:none;border:none;cursor:pointer;font-size:22px;color:#CCC;padding:0;line-height:1;flex-shrink:0;">×</button>
          </div>
        </div>`;
        }).join('')}
      </div>`).join('')}
    </div>

/* ═══════════════════════════════════════════
   9. 원내 데스크  3840 × 2160
   ── 상단 브랜딩(썸네일 스타일) + 하단 가격표 배너
═══════════════════════════════════════════ */
function tDesk(data, bgUrl) {
  const { concept } = data;
  const bn = concept.brand_name || 'Le Shine';
  const rows = concept.desk_rows || [];

  // Adaptive columns: 1~2개→1열, 3~6개→2열, 7+개→3열
  const cols   = rows.length <= 2 ? 1 : rows.length <= 6 ? 2 : 3;
  const panelW = cols === 1 ? 1290 : cols === 2 ? 2370 : 3360;
  const chunkSize = Math.ceil(rows.length / cols);
  const chunks = [];
  for (let i = 0; i < Math.max(rows.length, 1); i += chunkSize) {
    chunks.push(rows.slice(i, i + chunkSize).map((r, j) => ({ ...r, _i: i + j })));
  }

  return `
<div style="width:3840px;height:2160px;position:relative;overflow:hidden;font-family:'Pretendard','Jost',sans-serif;${bgCSS(bgUrl,'#1a2e20')}">
  ${bgUrl ? ovRadial('30%','45%',.5) : ovGreen()}

  <!-- ── LEFT area, text center-aligned ── -->
  <div style="position:absolute;top:0;left:0;width:2200px;bottom:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 200px;">
    <div style="font-size:75px;color:#FFFFFF;letter-spacing:-0.03em;line-height:1.6;font-weight:300;margin-bottom:42px;">${concept.sub_copy}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-size:195px;color:#FFFFFF;line-height:1.0;font-weight:300;">${bn}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-size:195px;color:#FFFFFF;line-height:1.0;font-weight:300;">${concept.name}</div>
    <div style="font-family:'New York','Cormorant Garamond',serif;font-weight:300;font-size:52px;letter-spacing:-0.03em;color:#FFFFFF;border:2px solid rgba(255,255,255,.55);border-radius:50%;padding:44px 105px;display:inline-flex;align-items:center;justify-content:center;line-height:1;margin-top:60px;">${concept.theme_label}</div>
  </div>

  <!-- ── Bottom-right: price panel (display-only, TV에서 수정) ── -->
  <div style="position:absolute;bottom:175px;right:200px;z-index:2;width:${panelW}px;background:rgba(250,250,253,.88);">
    <div style="padding:42px 84px 48px;display:flex;gap:84px;">
      ${chunks.map(chunk => `
      <div style="flex:1;">
        ${chunk.map(row => {
          const rowPrices = row.prices || [{ count: row.count||'', value: row.price||'0만원' }];
          return `
        <div style="padding:20px 0;">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:30px;">
            <div style="font-family:'Pretendard',sans-serif;font-size:39pt;font-weight:600;color:#1A1A1A;letter-spacing:-0.04em;line-height:1.2;flex:1;min-width:0;">${row.name}</div>
            <div style="display:flex;flex-direction:row;flex-wrap:wrap;align-items:flex-end;justify-content:flex-end;gap:6px 20px;flex-shrink:0;">
              ${rowPrices.map(p => {
                const [num, unit] = splitPriceVal(p.value);
                return `
              <div style="display:flex;align-items:baseline;gap:12px;">
                ${p.count ? `<div style="font-family:'Pretendard',sans-serif;font-size:24pt;font-weight:300;color:#888;letter-spacing:-0.02em;line-height:1;">${p.count}</div>` : ''}
                <div style="display:inline-flex;align-items:baseline;gap:2px;font-family:'GmarketSans','Pretendard',sans-serif;color:#143428;letter-spacing:-0.04em;"><span style="font-size:39pt;font-weight:500;line-height:1;">${num}</span><span style="font-size:20pt;font-weight:300;line-height:1;">${unit}</span></div>
              </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
        }).join('')}
      </div>`).join('')}
    </div>
  </div>
</div>`;
}

/* ═══════════════════════════════════════════
   INLINE EDITOR
═══════════════════════════════════════════ */
function attachEditors() {
  document.querySelectorAll('#canvas-el [data-edit]').forEach(node => {
    node.contentEditable = 'true';
    node.spellcheck = false;
    // Enter 키로 포커스 해제
    node.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); node.blur(); }
    });
    // 편집 완료 시 데이터 반영 (data-save-suffix: 단위 고정 접미사)
    if (node.dataset.rerender) {
      node.addEventListener('focus', () => {
        node.textContent = node.dataset.edit.split('.').reduce((o, k) => o?.[isNaN(k)?k:+k], S.data) ?? '';
      });
    }
    node.addEventListener('blur', () => {
      const path = node.dataset.edit;
      let val = node.textContent.trim();
      if (node.dataset.saveSuffix) {
        const sfx = node.dataset.saveSuffix;
        if (!val.endsWith(sfx)) val = val + sfx;
      }
      setNestedValue(S.data, path, val);
      if (node.dataset.rerender) render();
    });
    // 포커스 시 사이즈 버튼 클릭 방지
    node.addEventListener('mousedown', e => e.stopPropagation());
  });
}

function setNestedValue(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = isNaN(parts[i]) ? parts[i] : +parts[i];
    cur = cur[k];
  }
  const last = isNaN(parts.at(-1)) ? parts.at(-1) : +parts.at(-1);
  cur[last] = value;
}

/* ═══════════════════════════════════════════
   COLOR HELPERS
═══════════════════════════════════════════ */
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}
function computeBgAccentDark(avgR, avgG, avgB) {
  const r = avgR/255, g = avgG/255, b = avgB/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const d = max - min;
  let h = 0;
  if (d > 0.01) {
    if (max === r) h = ((g-b)/d + (g<b?6:0)) * 60;
    else if (max === g) h = ((b-r)/d + 2) * 60;
    else h = ((r-g)/d + 4) * 60;
  }
  return hslToHex(h, 55, 22);
}
function computeBgAccentLight(avgR, avgG, avgB) {
  const r = avgR/255, g = avgG/255, b = avgB/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const d = max - min;
  let h = 0;
  if (d > 0.01) {
    if (max === r) h = ((g-b)/d + (g<b?6:0)) * 60;
    else if (max === g) h = ((b-r)/d + 2) * 60;
    else h = ((r-g)/d + 4) * 60;
  }
  return hslToHex(h, 55, 72);
}

/* ═══════════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════════ */
function setupBg() {
  const fi = document.getElementById('bg-file');

  fi.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    // FileReader로 base64 data URL 변환 → html2canvas CORS 문제 방지
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      S.bgUrl = dataUrl;
      showThumb(dataUrl);

      // 이미지 색상 자동 샘플링
      const img = new Image();
      img.onload = () => {
        const cv = document.createElement('canvas');
        cv.width = 48; cv.height = 48;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, 48, 48);
        const d = ctx.getImageData(0, 0, 48, 48).data;
        let r=0, g=0, b=0, n=0;
        for (let i=0; i<d.length; i+=4) {
          r += d[i]; g += d[i+1]; b += d[i+2]; n++;
        }
        const aR = r/n, aG = g/n, aB = b/n;
        S.bgTone = `${Math.round(aR*.42)},${Math.round(aG*.42)},${Math.round(aB*.42)}`;
        const lR = Math.round(aR*.15 + 255*.85);
        const lG = Math.round(aG*.15 + 255*.85);
        const lB = Math.round(aB*.15 + 255*.85);
        S.bgLightColor = `rgb(${lR},${lG},${lB})`;
        S.bgAccentDark  = computeBgAccentDark(aR, aG, aB);
        S.bgAccentLight = computeBgAccentLight(aR, aG, aB);
        render();
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(f);
  });

  document.getElementById('bg-clear').onclick = () => {
    S.bgUrl = ''; S.bgTone = '8,12,10'; S.bgLightColor = '#FAFAFD'; S.bgAccentDark = '#143428'; render(); showThumb('');
    fi.value = '';
  };
}

function showThumb(url) {
  const el = document.getElementById('bg-thumb');
  el.innerHTML = url
    ? `<img src="${url}" alt="">`
    : `<div class="bg-ph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>클릭하여 업로드</div>`;
}

═══════════════════════════════════════════ */
function setupExport() {
  document.getElementById('export-sb').onclick = doExport;
  document.getElementById('export-all').onclick = doExportAll;
}

async function doExport() {
  const s   = SIZES[S.idx];
  const btn = document.getElementById('export-sb');
  const ld  = document.getElementById('loading');
  const msg = document.getElementById('ld-msg');
  if (btn) btn.disabled = true;
  if (ld)  ld.style.display = 'flex';
  try {
    if (typeof html2canvas === 'undefined') throw new Error('html2canvas 미로드. 인터넷 연결 확인');
    if (s.id === 'a4-interior') {
      const pages = tA4Int(S.data, S.bgUrl);
      for (let i = 0; i < pages.length; i++) {
        if (msg) msg.textContent = `PNG 생성 중... (${i+1} / ${pages.length})`;
        const w = mount(pages[i], s.w, s.h);
        await waitFonts();
        const cv = await html2canvas(w.firstElementChild, { scale: s.sc||1, useCORS:true, allowTaint:false, width:s.w, height:s.h, logging:false });
        unmount(w);
        await dl(cv, `leshine_a4_interior_p${i+1}.png`);
      }
    } else {
      if (msg) msg.textContent = 'PNG 생성 중...';
      const html = route(s.id, S.data, S.bgUrl);
      const isLanding = s.id === 'landing';
      const w = mount(html, s.w, isLanding ? 'auto' : s.h);
      await waitFonts();
      const actualH = isLanding ? w.firstElementChild.scrollHeight : s.h;
      const sc = s.sc || 1;
      const cv = await html2canvas(w.firstElementChild, { scale:sc, useCORS:true, allowTaint:false, width:s.w, height:actualH, windowWidth:s.w, windowHeight:actualH, logging:false });
      unmount(w);
      await dl(cv, `leshine_${s.id}.png`);
    }
  } catch(e) {
    console.error(e);
    alert('내보내기 오류: ' + e.message);
  } finally {
    if (ld)  ld.style.display = 'none';
    if (btn) btn.disabled = false;
  }
}

async function doExportAll() {
  const btnAll = document.getElementById('export-all');
  const btnOne = document.getElementById('export-sb');
  const ld     = document.getElementById('loading');
  const msg    = document.getElementById('ld-msg');
  if (btnAll) btnAll.disabled = true;
  if (btnOne) btnOne.disabled = true;
  if (ld) ld.style.display = 'flex';
  try {
    if (typeof html2canvas === 'undefined') throw new Error('html2canvas 미로드. 인터넷 연결 확인');
    let done = 0;
    // 전체 파일 수 계산
    let total = 0;
    for (const s of SIZES) {
      total += (s.id === 'a4-interior') ? tA4Int(S.data, S.bgUrl).length : 1;
    }
    for (const s of SIZES) {
      if (s.id === 'a4-interior') {
        const pages = tA4Int(S.data, S.bgUrl);
        for (let i = 0; i < pages.length; i++) {
          done++;
          if (msg) msg.textContent = `전체 저장 중... (${done}/${total}) ${s.name} p${i+1}`;
          const w = mount(pages[i], s.w, s.h);
          await waitFonts();
          const cv = await html2canvas(w.firstElementChild, { scale: s.sc||1, useCORS:true, allowTaint:false, width:s.w, height:s.h, logging:false });
          unmount(w);
          await dl(cv, `leshine_a4_interior_p${i+1}.png`);
        }
      } else {
        done++;
        if (msg) msg.textContent = `전체 저장 중... (${done}/${total}) ${s.name}`;
        const html = route(s.id, S.data, S.bgUrl);
        const isLanding = s.id === 'landing';
        const w = mount(html, s.w, isLanding ? 'auto' : s.h);
        await waitFonts();
        const actualH = isLanding ? w.firstElementChild.scrollHeight : s.h;
        const sc = s.sc || 1;
        const cv = await html2canvas(w.firstElementChild, { scale:sc, useCORS:true, allowTaint:false, width:s.w, height:actualH, windowWidth:s.w, windowHeight:actualH, logging:false });
        unmount(w);
        await dl(cv, `leshine_${s.id}.png`);
      }
    }
  } catch(e) {
    console.error(e);
    alert('전체 내보내기 오류: ' + e.message);
  } finally {
    if (ld)     ld.style.display = 'none';
    if (btnAll) btnAll.disabled = false;
    if (btnOne) btnOne.disabled = false;
  }
}

function dl(canvas, name) {
  return new Promise(resolve => {
    canvas.toBlob(blob => {
      if (!blob) { resolve(); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { URL.revokeObjectURL(url); resolve(); }, 600);
    }, 'image/png');
  });
}

function mount(html, w, h) {
  const d = document.createElement('div');
  const heightCss = (h === 'auto') ? '' : `height:${h}px;overflow:hidden;`;
  d.style.cssText = `position:fixed;top:-9999px;left:-9999px;width:${w}px;${heightCss}`;
  d.innerHTML = html;
  // 내보내기 시 편집 컨트롤 제거
  d.querySelectorAll('[data-ctrl]').forEach(el => el.remove());
  document.body.appendChild(d);
  return d;
}

async function waitFonts() {
  await document.fonts.ready;
  // PT Serif 등 핵심 폰트가 실제 로드됐는지 추가 확인
  try {
    await Promise.all([
      document.fonts.load('300 20px "Cormorant Garamond"'),
      document.fonts.load('300 20px "Cormorant Garamond"'),
      document.fonts.load('500 20px "GmarketSans"'),
      document.fonts.load('400 20px "Pretendard"'),
    ]);
  } catch(e) { /* 폰트 로드 실패해도 진행 */ }
  await sleep(100);
}
